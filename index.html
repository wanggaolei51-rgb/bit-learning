<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>LEO-BIR V3.0.3</title>
<style>
:root{--primary:#00d4aa;--primary-dim:#00a884;--bg:#0a0e17;--bg-elev:#121929;--bg-card:#1a2236;--border:#2a3550;--text:#e8ecf1;--text-dim:#8b95a8;--accent:#f59e0b;--danger:#ef4444;--success:#22c55e;--info:#3b82f6;--radius:14px;--shadow:0 4px 24px rgba(0,0,0,.35)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.app{display:flex;min-height:100vh}
.sidebar{width:260px;background:var(--bg-elev);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100;transition:transform .3s;overflow-y:auto;scrollbar-width:none;-ms-overflow-style:none}
.sidebar-header{padding:22px 18px;border-bottom:1px solid var(--border);text-align:center}
.sidebar-header h1{font-size:18px;color:var(--primary);font-weight:700}
.sidebar-header .ver{font-size:11px;color:var(--text-dim);margin-top:4px}
.sidebar-section{padding:14px 0;border-bottom:1px solid var(--border)}
.sidebar-section h3{font-size:11px;color:var(--primary);text-transform:uppercase;letter-spacing:1.5px;padding:0 18px;margin-bottom:8px}
.nav-list{list-style:none}
.nav-list li{padding:9px 18px;margin:1px 8px;border-radius:8px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:10px;transition:all .2s;color:var(--text-dim)}
.nav-list li:hover{background:rgba(0,212,170,.08);color:var(--text)}
.nav-list li.active{background:rgba(0,212,170,.15);color:var(--primary);font-weight:500}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 14px}
.stat-card{text-align:center;padding:10px;background:var(--bg-card);border-radius:10px;border:1px solid var(--border);cursor:pointer;transition:all .2s}
.stat-card:hover{border-color:var(--primary-dim);transform:translateY(-1px)}
.stat-card .num{font-size:20px;font-weight:700;color:var(--primary)}
.stat-card .lab{font-size:10px;color:var(--text-dim);margin-top:2px}
.main{flex:1;margin-left:260px;min-height:100vh}
.topbar{position:sticky;top:0;z-index:50;background:rgba(10,14,23,.85);backdrop-filter:blur(12px);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.menu-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:18px}
.content{padding:20px 24px;max-width:1200px;margin:0 auto}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.card-header h2{font-size:17px;color:var(--primary);font-weight:600}
.card-header .badge{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(0,212,170,.12);color:var(--primary-dim)}
.welcome-banner{background:linear-gradient(135deg,rgba(0,212,170,.12),rgba(59,130,246,.08));border:1px solid rgba(0,212,170,.2);border-radius:var(--radius);padding:24px;margin-bottom:20px}
.welcome-banner h2{font-size:22px;color:var(--primary);margin-bottom:6px}
.welcome-banner p{color:var(--text-dim);font-size:14px}
.quick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.quick-btn{padding:16px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);text-align:center;cursor:pointer;transition:all .2s}
.quick-btn:hover{border-color:var(--primary-dim);transform:translateY(-2px);box-shadow:var(--shadow)}
.quick-btn .icon{font-size:28px;margin-bottom:8px;display:block}
.quick-btn .label{font-size:12px;color:var(--text-dim)}
.cal-wrap{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.cal-header h3{font-size:16px;color:var(--primary);margin:0}
.cal-nav{background:var(--bg-elev);border:1px solid var(--border);color:var(--text);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:13px}
.sidebar::-webkit-scrollbar{display:none}.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center}
.cal-wd{font-size:11px;color:var(--text-dim);padding:8px 2px;font-weight:600}
.cal-day{padding:8px 2px;border-radius:8px;cursor:pointer;font-size:13px;transition:all .15s;min-height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg-elev);border:1px solid transparent}
.cal-day:hover{background:rgba(0,212,170,.1);border-color:rgba(0,212,170,.25)}
.cal-day.today{background:rgba(0,212,170,.2);border-color:var(--primary);color:var(--primary);font-weight:700}
.cal-day.has-data{background:rgba(0,212,170,.08)}
.cal-day .dnum{font-size:13px}
.cal-day .ddots{display:flex;gap:2px;margin-top:3px}
.cal-day .ddot{width:5px;height:5px;border-radius:50%;background:var(--success)}
.cal-day .ddot.rev{background:var(--accent)}
.cal-day .ddot.neww{background:var(--info)}
.cal-legend{display:flex;gap:16px;justify-content:center;margin-top:12px;font-size:11px;color:var(--text-dim)}
.back-btn{background:var(--bg-elev);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:6px;cursor:pointer;margin-bottom:16px;font-size:13px}
.word-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-top:12px}
.word-card{padding:14px;background:var(--bg-elev);border-radius:10px;border:1px solid var(--border);cursor:pointer;transition:all .2s}
.word-card:hover{border-color:var(--primary-dim)}
.word-card .w-word{font-size:15px;font-weight:700;color:var(--primary)}
.word-card .w-ipa{font-size:12px;color:var(--accent);font-family:monospace}
.word-card .w-mean{font-size:12px;color:var(--text-dim);margin-top:4px}
.trans-box{display:flex;flex-direction:column;gap:12px}
.trans-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.trans-row select{padding:8px 12px;background:var(--bg-elev);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px}
.trans-input{width:100%;min-height:80px;background:var(--bg-elev);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-size:14px;resize:vertical;font-family:inherit}
.trans-btn{padding:10px 20px;background:var(--primary);color:#000;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:14px;transition:opacity .2s}
.trans-btn:hover{opacity:.85}
.trans-result{margin-top:12px;padding:16px;background:var(--bg-elev);border-radius:10px;border:1px solid var(--border);display:none}
.trans-result.show{display:block}
.trans-result .r-word{font-size:18px;font-weight:700;color:var(--primary);margin-bottom:6px}
.trans-result .r-ipa{font-size:13px;color:var(--accent);font-family:monospace;margin-bottom:8px}
.trans-result .r-mean{font-size:14px;color:var(--text);line-height:1.7}
.trans-result .r-tag{display:inline-block;padding:2px 8px;border-radius:6px;background:rgba(0,212,170,.12);color:var(--primary-dim);font-size:11px;margin-top:6px}
.trans-result .r-action{margin-top:12px;display:flex;gap:8px}
.trans-result .r-action button{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px}
.trans-result .r-action .btn-save{background:rgba(139,92,246,.15);color:#a78bfa;border:1px solid rgba(139,92,246,.3)}
.trans-result .r-action .btn-speak{background:rgba(59,130,246,.15);color:#3b82f6;border:1px solid rgba(59,130,246,.3)}
.trans-result .r-source{font-size:11px;color:var(--text-dim);margin-top:8px}
.wb-toolbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.wb-toolbar button{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:500}
.wb-toolbar .btn-exp{background:rgba(59,130,246,.15);color:#3b82f6;border:1px solid rgba(59,130,246,.3)}
.wb-toolbar .btn-clr{background:rgba(239,68,68,.15);color:var(--danger);border:1px solid rgba(239,68,68,.3)}
.wb-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.wb-item{padding:14px;background:var(--bg-elev);border-radius:10px;border:1px solid var(--border)}
.wb-item .wb-w{font-size:15px;font-weight:700;color:var(--primary)}
.wb-item .wb-i{font-size:12px;color:var(--accent);font-family:monospace}
.wb-item .wb-m{font-size:12px;color:var(--text-dim);margin-top:3px}
.wb-item .wb-act{display:flex;gap:6px;margin-top:8px}
.wb-item .wb-act button{padding:4px 10px;border-radius:4px;border:none;cursor:pointer;font-size:11px}
.wb-item .wb-act .wb-mas{background:rgba(34,197,94,.15);color:var(--success);border:1px solid rgba(34,197,94,.3)}
.wb-item .wb-act .wb-del{background:rgba(239,68,68,.15);color:var(--danger);border:1px solid rgba(239,68,68,.3)}
.wb-empty{text-align:center;padding:50px 20px;color:var(--text-dim)}
.wb-empty .big{font-size:48px;margin-bottom:10px}
.quiz-card{padding:18px;background:var(--bg-elev);border-radius:10px;border:1px solid var(--border);margin-bottom:12px}
.quiz-card .q-text{font-size:14px;margin-bottom:10px}
.quiz-card .q-opt{padding:10px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;margin:5px 0;cursor:pointer;transition:all .2s;font-size:13px}
.quiz-card .q-opt:hover{border-color:var(--primary-dim)}
.quiz-card .q-opt.correct{border-color:var(--success);background:rgba(34,197,94,.1)}
.quiz-card .q-opt.wrong{border-color:var(--danger);background:rgba(239,68,68,.1)}
.vinput-area{display:flex;flex-direction:column;gap:12px}
.vinput-ta{width:100%;min-height:120px;background:var(--bg-elev);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-size:14px;resize:vertical;font-family:inherit}
.vinput-btns{display:flex;gap:10px}
.vinput-btns button{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:14px}
.vinput-btns .btn-parse{background:var(--primary);color:#000}
.vinput-btns .btn-clear{background:var(--bg-elev);color:var(--text);border:1px solid var(--border)}
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-top:12px}
.vocab-card{padding:12px;background:var(--bg-elev);border-radius:10px;border:1px solid var(--border);cursor:pointer;transition:all .2s}
.vocab-card:hover{border-color:var(--primary-dim)}
.vocab-card .vc-w{font-size:14px;font-weight:700;color:var(--primary)}
.vocab-card .vc-i{font-size:11px;color:var(--accent);font-family:monospace}
.vocab-card .vc-m{font-size:12px;color:var(--text-dim);margin-top:3px}
.vocab-filter{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.vocab-filter button{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg-elev);color:var(--text-dim);cursor:pointer;font-size:12px}
.vocab-filter button.active{background:rgba(0,212,170,.15);color:var(--primary);border-color:var(--primary-dim)}
.tooltip{position:fixed;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;z-index:10000;max-width:300px;box-shadow:var(--shadow);display:none}
.tooltip.show{display:block}
.tooltip .tt-w{font-size:18px;font-weight:700;color:var(--primary);margin-bottom:4px}
.tooltip .tt-i{font-size:13px;color:var(--accent);font-family:monospace;margin-bottom:6px}
.tooltip .tt-t{font-size:13px;color:var(--text);margin-bottom:3px}
.tooltip .tt-r{font-size:11px;color:var(--text-dim);margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--bg-card);border:1px solid var(--border);padding:12px 24px;border-radius:10px;z-index:20000;transition:transform .3s;box-shadow:var(--shadow);font-size:13px}
.toast.show{transform:translateX(-50%) translateY(0)}
.review-card{padding:12px 14px;background:var(--bg-elev);border-radius:10px;border:1px solid var(--border);margin-bottom:8px;display:flex;align-items:center;gap:12px}
.review-card .r-due{font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(245,158,11,.15);color:var(--accent);white-space:nowrap}
.review-card .r-word{color:var(--primary);font-weight:600;font-size:14px}
.review-card .r-mean{color:var(--text-dim);font-size:12px}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .menu-btn{display:flex}
  .quick-grid{grid-template-columns:repeat(2,1fr)}
  .content{padding:14px}
}

.clickable-word{cursor:pointer;border-bottom:1px dotted rgba(0,212,170,.4);transition:all .2s;padding:0 1px}
.clickable-word:hover{background:rgba(0,212,170,.2);border-radius:3px;border-bottom-color:var(--primary)}
#wordPopupOverlay{animation:fadeIn .2s ease}@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.mind-level2{display:none;animation:slideDown .3s ease}.mind-level3{display:none;animation:slideDown .3s ease}@keyframes slideDown{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}.ebbing-point{transition:all .2s}.ebbing-point:hover{r:7;filter:drop-shadow(0 0 4px var(--primary))}</style>
</head>
<body>
<div class="app">
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div style="width:64px;height:64px;border-radius:50%;background:var(--bg-card);border:2px solid var(--primary);margin:0 auto 10px;overflow:hidden;display:flex;align-items:center;justify-content:center;overflow:hidden;"><img src="avatar.jpg" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"></div>
    <h1>LEO-BIR</h1>
    <div class="ver">LEO-BIR V3.0 · 艾宾浩斯增强</div>
  </div>
  <div class="sidebar-section">
    <h3>📊 学习统计</h3>
    <div class="stats-grid">
      <div class="stat-card" onclick="location.hash='vocabulary'">
        <div class="num" id="s-new">0</div><div class="lab">新词汇</div>
      </div>
      <div class="stat-card" onclick="location.hash='review'">
        <div class="num" id="s-rev">0</div><div class="lab">待复习</div>
      </div>
      <div class="stat-card" onclick="location.hash='wordbank'">
        <div class="num" id="s-total">0</div><div class="lab">累计</div>
      </div>
      <div class="stat-card">
        <div class="num" id="s-streak">1</div><div class="lab">连续天数</div>
      </div>
    </div>
  </div>
  <div class="sidebar-section">
    <h3>📚 导航</h3>
    <ul class="nav-list" id="navList">
      <li class="active" data-route="home"><span style="margin-right:8px">🏠</span>主页</li>
      <li data-route="translate"><span style="margin-right:8px">🌐</span>翻译</li>
      <li data-route="input"><span style="margin-right:8px">📝</span>词汇录入</li>
      <li data-route="wordbank"><span style="margin-right:8px">📚</span>生词本</li>
      <li data-route="quiz"><span style="margin-right:8px">🎯</span>课时测试</li>
      <li data-route="vocabulary"><span style="margin-right:8px">📖</span>词汇库</li>
      <li data-route="review"><span style="margin-right:8px">🧠</span>复习</li>
      <li data-route="aichat"><span style="margin-right:8px">🤖</span>AI对话</li>
      <li data-route="member"><span style="margin-right:8px">👑</span>会员中心</li>
      <li data-route="about"><span style="margin-right:8px">📋</span>关于LEO-BIR</li>
      <li data-route="version"><span style="margin-right:8px">📜</span>版本记录</li>
    </ul>
  </div>
  <div class="sidebar-section" style="padding:14px 18px;font-size:11px;color:var(--text-dim);line-height:1.8">
    <div>📅 今日: <span id="sidebar-today">--</span></div>
  </div>
</aside>
<main class="main" id="main">
  <div class="topbar">
    <button class="menu-btn" id="menuBtn">☰</button>
    <button class="menu-btn" id="backBtn" style="display:none;margin-right:8px;" onclick="navigate('home')">←</button><div class="topbar-title" id="pageTitle">🏠 主页</div>
    <div id="memberBadge" style="margin-left:auto;font-size:12px;padding:4px 10px;border-radius:8px;cursor:pointer;" onclick="navigate('member')"></div>
  </div>
  <div class="content" id="appContent"></div>
</main>
</div>
<div class="tooltip" id="tooltip">
  <div class="tt-w" id="ttw"></div>
  <div class="tt-i" id="tti"></div>
  <div class="tt-t" id="ttt"></div>
  <div class="tt-r" id="ttr"></div>
</div>
<div class="toast" id="toast"></div>
<script>
const vocabDB = {
'Selamat':{ipa:'/səˈlamat/',cn:'安全/祝...',en:'safe / congratulations',root:'salamat (Arabic)',tag:'问候语'},
'pagi':{ipa:'/ˈpaɡi/',cn:'早上',en:'morning',root:'pagi',tag:'时间词'},
'Bapak':{ipa:'/ˈbapak/',cn:'先生/父亲',en:'sir / father',root:'bapak',tag:'称谓'},
'Ibu':{ipa:'/ˈibu/',cn:'女士/母亲',en:'madam / mother',root:'ibu',tag:'称谓'},
'Menteri':{ipa:'/mənˈtɛri/',cn:'部长',en:'minister',root:'menteri (Dutch)',tag:'职位'},
'Perkenalkan':{ipa:'/pərˈkɛnalakan/',cn:'介绍(请允许我)',en:'allow me to introduce',root:'kenal = know + per-+-kan',tag:'礼貌用语'},
'nama':{ipa:'/ˈnama/',cn:'名字',en:'name',root:'nama',tag:'基础词汇'},
'saya':{ipa:'/ˈsaja/',cn:'我(正式)',en:'I (formal)',root:'saya',tag:'代词'},
'General':{ipa:'/ˈdʒɛnɛral/',cn:'总经理',en:'general',root:'general (English)',tag:'职位'},
'Manager':{ipa:'/ˈmanədʒər/',cn:'经理',en:'manager',root:'manager (English)',tag:'职位'},
'PT':{ipa:'/peˈte/',cn:'有限公司(Perseroan Terbatas)',en:'Ltd. / PT company',root:'PT',tag:'商务缩写'},
'beroperasi':{ipa:'/bərˈoperasi/',cn:'运营/操作',en:'to operate',root:'operasi = operation',tag:'ber-动词'},
'di':{ipa:'/di/',cn:'在...',en:'in / at',root:'di',tag:'介词'},
'kawasan':{ipa:'/kaˈwasan/',cn:'区域/园区',en:'area / zone',root:'kawasan',tag:'地点'},
'industri':{ipa:'/ˈindustri/',cn:'工业/产业',en:'industry',root:'industri (Dutch)',tag:'商务高频'},
'Morowali':{ipa:'/moroˈwali/',cn:'莫罗瓦利(印尼中苏拉威西省)',en:'Morowali (Central Sulawesi)',root:'地名',tag:'地名'},
'datang':{ipa:'/ˈdataŋ/',cn:'到来',en:'to come / arrive',root:'datang',tag:'基础词汇'},
'Apa':{ipa:'/ˈapa/',cn:'什么/怎么',en:'what / how',root:'apa',tag:'疑问词'},
'kabarmu':{ipa:'/ˈkabarmu/',cn:'你的消息(你好吗)',en:'your news (how are you)',root:'kabar + -mu (your)',tag:'问候语'},
'Semoga':{ipa:'/səˈmoɡa/',cn:'希望/但愿',en:'hopefully / may',root:'semoga',tag:'祝愿词'},
'perjalanan':{ipa:'/pərdʒaˈlanan/',cn:'旅途/行程',en:'journey / trip',root:'jalan = road + per-/-an',tag:'商务高频'},
'Anda':{ipa:'/ˈanda/',cn:'您(正式)',en:'you (formal)',root:'anda',tag:'代词'},
'lancar':{ipa:'/ˈlantʃar/',cn:'顺利/流畅',en:'smooth / fluent',root:'lancar',tag:'基础词汇'},
'Terima':{ipa:'/təˈrima/',cn:'接收',en:'to receive',root:'terima',tag:'基础词汇'},
'kasih':{ipa:'/ˈkasih/',cn:'给予/爱',en:'to give / love',root:'kasih',tag:'基础词汇'},
'senang':{ipa:'/səˈnaŋ/',cn:'高兴/开心',en:'happy / glad',root:'senang',tag:'基础词汇'},

function renderCalHTML(){
  const y=currentDate.getFullYear(),m=currentDate.getMonth();
  const fd=new Date(y,m,1).getDay(),td=new Date(y,m+1,0).getDate();
  const tds=new Date().toISOString().slice(0,10),wd=["日","一","二","三","四","五","六"];
  let h=`<div class="cal-wrap"><div class="cal-header"><button class="cal-nav" onclick="changeMonth(-1)">◀</button><h3>${y}年${m+1}月</h3><button class="cal-nav" onclick="changeMonth(1)">▶</button></div><div class="cal-grid">`;
  wd.forEach(d=>h+=`<div class="cal-wd">${d}</div>`);
  for(let i=0;i<fd;i++)h+=`<div class="cal-day" style="background:transparent;cursor:default"></div>`;
  for(let d=1;d<=td;d++){

async function doTranslate(){if(!checkAccess("翻译"))return;
  const input=document.getElementById("tInput").value.trim();if(!input)return;
  const resultDiv=document.getElementById("tResult");resultDiv.innerHTML=`<div style="color:var(--text-dim);padding:20px;text-align:center">翻译中...</div>`;resultDiv.classList.add("show");
  const fromLang=document.getElementById("tFrom").value,toLang=document.getElementById("tTo").value;
  const words=input.split(/[\s,，.。!！?？]+/).filter(w=>w.length>0);
  let html="",tc=0;
  for(const word of words.slice(0,5)){
    const w=word.toLowerCase();
    const v=vocabDB[w]||vocabDB[w.charAt(0).toUpperCase()+w.slice(1)];
    if(v){
      html+=`<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)"><div class="r-word">${word}</div><div class="r-ipa">${v.ipa||"—"}</div><div class="r-mean"><span style="color:var(--primary-dim)">🇨🇳</span> ${v.cn||"—"}<br><span style="color:var(--primary-dim)">🇬🇧</span> ${v.en||"—"}</div><div class="r-tag">词根:${v.root||"—"} | 标签:${v.tag||"—"}</div><div class="r-source">来源: BIT词库</div><div class="r-action"><button class="btn-save" onclick="addWB('${word.replace(/'/g,"\'")}','${(v.ipa||"").replace(/'/g,"\'")}','${(v.cn||"").replace(/'/g,"\'")}','${(v.en||"").replace(/'/g,"\'")}','${(v.root||"").replace(/'/g,"\'")}','${(v.tag||"").replace(/'/g,"\'")}')">💾 加入生词本</button><button class="btn-speak" onclick="speak('${word.replace(/'/g,"\'")}','id')">🔊 朗读</button></div></div>`;
      tc++;
    }else{
      const aff=stripAffixes(w);let found=false;
      for(const a of aff){const rv=vocabDB[a.root]||vocabDB[a.root.charAt(0).toUpperCase()+a.root.slice(1)];if(rv){html+=`<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)"><div class="r-word">${word}</div><div class="r-ipa">${rv.ipa||"—"}</div><div class="r-mean"><span style="color:var(--primary-dim)">🇨🇳</span> ${rv.cn||"—"}</div><div style="font-size:12px;color:var(--accent);margin-top:6px">🔧 词缀:${a.affix}+${a.root}(${a.type})</div><div class="r-source">来源:词缀拆解</div><div class="r-action"><button class="btn-save" onclick="addWB('${word.replace(/'/g,"\'")}','${(rv.ipa||"").replace(/'/g,"\'")}','${(rv.cn||"").replace(/'/g,"\'")}','${(rv.en||"").replace(/'/g,"\'")}','${(rv.root||"").replace(/'/g,"\'")}','${(rv.tag||"").replace(/'/g,"\'")}')">💾 加入生词本</button><button class="btn-speak" onclick="speak('${word.replace(/'/g,"\'")}','id')">🔊 朗读</button></div></div>`;found=true;tc++;break;}}
      if(!found){
        const gt=await gTrans(word,fromLang,toLang);
        if(gt){html+=`<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)"><div class="r-word">${word}</div><div style="font-size:14px;color:var(--text);margin-top:6px"><span style="color:var(--primary-dim)">🇨🇳</span> ${gt}</div><div class="r-source">来源:Google Translate</div><div class="r-action"><button class="btn-save" onclick="addWB('${word.replace(/'/g,"\'")}','—','${gt.replace(/'/g,"\'")}','—','—','Google翻译')">💾 加入生词本</button><button class="btn-speak" onclick="speak('${word.replace(/'/g,"\'")}','id')">🔊 朗读</button></div></div>`;tc++;}
        else html+=`<div style="padding:12px;background:rgba(239,68,68,.08);border-radius:8px;margin-bottom:10px"><div style="font-weight:700">${word}</div><div style="color:var(--text-dim);font-size:13px;margin-top:4px">未找到翻译</div></div>`;
      }
    }
  }
  resultDiv.innerHTML=html;resultDiv.classList.add("show");
  const ds=new Date().toISOString().slice(0,10);if(!learningHistory[ds])learningHistory[ds]={vocabNew:[],vocabReview:[],translations:0,notes:""};learningHistory[ds].translations+=tc;saveHistory();updateStats();
}

async function gTrans(text,sl,tl){
  try{const url="https://translate.googleapis.com/translate_a/single?client=gtx&sl="+sl+"&tl="+tl+"&dt=t&q="+encodeURIComponent(text);const res=await fetch(url);const data=await res.json();if(data&&data[0]&&data[0][0]&&data[0][0][0])return data[0][0][0];}catch(e){}
  return null;
}

function parseVocab(){if(!checkAccess("词汇录入"))return;

  const lines=input.split(/[\s,]+/).map(s=>s.trim()).filter(s=>s);
  const resultDiv=document.getElementById("vResult");resultDiv.style.display="block";resultDiv.classList.add("show");
  let found=0,pending=0;let html=`<div style="display:grid;grid-template-columns:1fr;gap:8px;margin-top:12px">`;
  lines.forEach(word=>{const key=Object.keys(vocabDB).find(k=>k.toLowerCase()===word.toLowerCase());if(key){found++;const v=vocabDB[key];html+=`<div style="padding:12px;background:rgba(34,197,94,.08);border-radius:8px;border-left:3px solid var(--success)"><div style="font-weight:700;color:var(--primary)">${key} <span style="color:var(--text-dim);font-weight:400">${v.ipa||""}</span></div><div style="font-size:12px;color:var(--text-dim);margin-top:3px">🇨🇳 ${v.cn||""}</div></div>`;}else{pending++;html+=`<div style="padding:12px;background:rgba(239,68,68,.08);border-radius:8px;border-left:3px solid var(--danger)"><div style="font-weight:700">${word}</div><div style="font-size:12px;color:var(--text-dim)">⏳ 待补充</div></div>`;}});
  html+=`</div>`;html+=`<div style="margin-top:14px;font-size:13px;color:var(--text-dim)">✅ ${found} · ⏳ ${pending} · 总计 ${lines.length}</div>`;
  resultDiv.innerHTML=html;
  const ds=new Date().toISOString().slice(0,10);if(!learningHistory[ds])learningHistory[ds]={vocabNew:[],vocabReview:[],translations:0,notes:""};lines.forEach(w=>{const key=Object.keys(vocabDB).find(k=>k.toLowerCase()===w.toLowerCase());if(key&&!learningHistory[ds].vocabNew.includes(key))learningHistory[ds].vocabNew.push(key);});saveHistory();updateStats();showToast("录入 "+found+" 词");
}

function renderWBList(){

function addWB(word,ipa,cn,en,root,tag){if(!checkAccess("添加生词"))return;if(wordBank.find(w=>w.word.toLowerCase()===word.toLowerCase())){showToast("已在生词本");return;}wordBank.unshift({word,ipa:ipa||"—",cn:cn||"—",en:en||"—",root:root||"—",tag:tag||"—",date:new Date().toISOString().slice(0,10),mastered:false});saveWB();showToast("「"+word+"」已保存");updateStats();}
function toggleWB(i){wordBank[i].mastered=!wordBank[i].mastered;saveWB();renderWBList();updateStats();}
function removeMasteredWB(i) {
  const w = wordBank[i];
  if (!w) return;
  const p = w.passed || {};
  if (!p.id2zh || !p.zh2id || !p.spell) { showToast('该词尚未三关全过，无法移除'); return; }
  if (!confirm(`确认移除已掌握单词: ${w.word}?`)) return;
  wordBank.splice(i, 1);
  saveWB();
  renderWBList();
  updateStats();
  showToast('✅ 已掌握，从生词本移除');

function delWB(i){if(!confirm("确定彻底删除?"))return;wordBank.splice(i,1);saveWB();renderWBList();updateStats();showToast("已彻底删除");}

function renderDailyQuiz(c) {
  const today = new Date().toISOString().slice(0,10);
  const tc = topicCalendar.find(t => t.date === today);
  
  if (!tc) {
    c.innerHTML = `<div class="card"><div class="card-header"><h2>🎯 今日课时测试</h2></div><div style="padding:20px;text-align:center;color:var(--text-dim);">今日没有安排课程</div></div>`;
    return;
  }
  
  const topic = topicData[tc.topic];
  if (!topic) {
    c.innerHTML = `<div class="card"><div class="card-header"><h2>🎯 今日课时测试</h2></div><div style="padding:20px;text-align:center;color:var(--text-dim);">话题数据未找到</div></div>`;
    return;
  }
  
  // 获取今日课程的词汇
  const todayWords = [];
  if (learningHistory[today] && learningHistory[today].vocabNew) {
    learningHistory[today].vocabNew.forEach(w => {
      if (vocabDB[w]) todayWords.push({word: w, data: vocabDB[w]});
    });
  }
  
  // 如果没有今日词汇，使用话题相关词汇
  if (todayWords.length === 0) {
    const topicWords = Object.keys(vocabDB).filter(k => {
      const v = vocabDB[k];
      return v.tag && (v.tag.includes(tc.topic) || tc.topic.includes(v.tag));
    }).slice(0, 10);
    topicWords.forEach(w => todayWords.push({word: w, data: vocabDB[w]}));
  }
  
  if (todayWords.length === 0) {
    c.innerHTML = `<div class="card"><div class="card-header"><h2>🎯 今日课时测试</h2></div><div style="padding:20px;text-align:center;color:var(--text-dim);">暂无今日词汇，请先学习课程</div></div>`;
    return;
  }
  
  // 生成测试题
  const questions = todayWords.slice(0, 5).map(w => {
    const wrong = Object.keys(vocabDB).filter(k => k !== w.word && vocabDB[k].cn).slice(0, 3).map(k => vocabDB[k].cn);
    return {word: w.word, data: w.data, wrong};
  });
  
  quizState = {q: 0, correct: 0, total: questions.length, done: 0, questions};
  
  c.innerHTML = `<div class="card"><div class="card-header"><h2>🎯 ${tc.date} 课时测试 · ${topic.title || tc.topic}</h2><span class="badge">${questions.length}题</span></div><div id="quizArea" style="padding:16px;"></div></div>`;
  showQuizQ();
}

function renderTopicQuiz(c, topicKey) {
  const topic = topicData[topicKey];
  if (!topic) {
    c.innerHTML = `<div class="card"><div class="card-header"><h2>🎯 话题测试</h2></div><div style="padding:20px;text-align:center;color:var(--text-dim);">话题不存在</div></div>`;
    return;
  }
  
  // 获取话题相关词汇
  const topicWords = [];

    if (v.tag && (v.tag.includes(topicKey) || topicKey.includes(v.tag))) {
      topicWords.push({word: k, data: v});
    }
  });
  
  if (topicWords.length === 0) {
    c.innerHTML = `<div class="card"><div class="card-header"><h2>🎯 ${topic.title || topicKey} 测试</h2></div><div style="padding:20px;text-align:center;color:var(--text-dim);">该话题暂无词汇</div></div>`;
    return;
  }
  
  // 随机选5题
  const shuffled = topicWords.sort(() => Math.random() - 0.5).slice(0, 5);
  const questions = shuffled.map(w => {
    const wrong = Object.keys(vocabDB).filter(k => k !== w.word && vocabDB[k].cn).slice(0, 3).map(k => vocabDB[k].cn);
    return {word: w.word, data: w.data, wrong};
  });
  
  quizState = {q: 0, correct: 0, total: questions.length, done: 0, questions};
  
  c.innerHTML = `<div class="card"><div class="card-header"><h2>🎯 ${topic.title || topicKey} 测试</h2><span class="badge">${questions.length}题</span></div><div id="quizArea" style="padding:16px;"></div></div>`;
  showQuizQ();
}

function renderQuiz(c){
  quizState={q:0,correct:0,total:5,done:0};const pool=Object.keys(vocabDB).filter(k=>vocabDB[k].cn);const sel=[];
  while(sel.length<5&&pool.length){const w=pool[Math.floor(Math.random()*pool.length)];if(!sel.find(s=>s.word===w)){const v=vocabDB[w];const wrong=pool.filter(p=>p!==w&&vocabDB[p].cn).map(p=>vocabDB[p].cn).slice(0,3);sel.push({word:w,data:v,wrong});}}quizState.questions=sel;
  c.innerHTML=`<div class="card"><div class="card-header"><h2>🎯 能力测试</h2><span class="badge">5题</span></div><div id="quizArea"><div style="text-align:center;padding:30px;color:var(--text-dim)"><div style="font-size:48px;margin-bottom:10px">🎯</div><div>5道选择题，检测词汇掌握程度</div><button class="trans-btn" style="margin-top:20px" onclick="startQuiz()">开始</button></div></div></div>`;
}
function startQuiz(){quizState.q=0;quizState.correct=0;quizState.done=0;showQ();}

// ===== 艾宾浩斯记忆曲线 · 话题深度结合复习系统 =====
// 间隔: 1, 2, 4, 7, 15, 30, 60, 90 天
const EBBINGHAUS_INTERVALS = [1, 2, 4, 7, 15, 30, 60, 90];

let topicHistory = JSON.parse(localStorage.getItem("bir_topic_h") || "[]");

function saveTopicHistory() {
  localStorage.setItem("bir_topic_h", JSON.stringify(topicHistory));
}

function recordTopicStudy(date, topicKey, dayNum) {
  const existing = topicHistory.find(t => t.date === date && t.topic === topicKey && t.day === dayNum);
  if (!existing) {
    topicHistory.push({ date, topic: topicKey, day: dayNum, completed: true, ts: Date.now() });
    saveTopicHistory();
  }
}

function getTopicReviewItems() {
  const now = new Date();
  const items = [];
  topicHistory.forEach(t => {
    const studyDate = new Date(t.date);
    const daysDiff = Math.floor((now - studyDate) / 86400000);
    EBBINGHAUS_INTERVALS.forEach(interval => {
      if (daysDiff >= interval && daysDiff < interval + 3) {
        const reviewed = t.reviews && t.reviews.find(r => r.interval === interval);
        if (!reviewed) {
          items.push({ ...t, daysSince: daysDiff, interval, due: true, type: 'topic' });
        }
      }
    });
  });
  return items.sort((a, b) => b.daysSince - a.daysSince);
}

function markTopicReviewed(date, topicKey, dayNum, interval) {if(!checkAccess("话题复习"))return;
  const t = topicHistory.find(t => t.date === date && t.topic === topicKey && t.day === dayNum);
  if (t) {
    if (!t.reviews) t.reviews = [];
    t.reviews.push({ interval, date: new Date().toISOString().slice(0,10), ts: Date.now() });
    saveTopicHistory();
  }
}

function getWordReviewItems() {
  const now = Date.now();
  const items = [];
  wordBank.forEach(w => {
    if (w.mastered) return;
    const days = Math.floor((now - new Date(w.date).getTime()) / 86400000);
    let matchedInterval = null;
    for (let iv of EBBINGHAUS_INTERVALS) {
      if (days >= iv && days < iv + 2) {
        matchedInterval = iv;
        break;
      }
    }
    if (!matchedInterval && days > 90) matchedInterval = 90;
    if (matchedInterval) {
      const reviewed = w.reviews && w.reviews.find(r => r.interval === matchedInterval);
      if (!reviewed) {
        items.push({ ...w, daysSince: days, interval: matchedInterval, due: true, type: 'word' });
      }
    }
  });
  return items.sort((a, b) => b.daysSince - a.daysSince);
}

function markWordReviewed(word, interval) {if(!checkAccess("词汇复习"))return;
  const w = wordBank.find(x => x.word === word);
  if (w) {
    if (!w.reviews) w.reviews = [];
    w.reviews.push({ interval, date: new Date().toISOString().slice(0,10) });
    saveWB();
  }
}

// === 艾宾浩斯记忆曲线 SVG V4：曲线 + 列表形式，纵向排列复习内容 ===

      if (reviewDate >= firstDate && reviewDate <= futureDate) {
        const rDaysFromFirst = Math.ceil((reviewDate - firstDate) / (1000 * 60 * 60 * 24));

    const ebbingPath = Array.from({length:totalDays+1},(_,i) => {const x=leftMargin+i*dayWidth;const y=20+180*(1-Math.exp(-i/10));return 'L ' + x + ',' + y;}).join(' ');

// ===== 艾宾浩斯曲线全局事件函数（供 SVG 内联 onmouseenter/onclick 调用） =====
let ebbingHoverTimer = null;
let ebbingCurrentEl = null;

function showEbbingTooltip(el, evt){
  ebbingCurrentEl = el;
  if(ebbingHoverTimer) clearTimeout(ebbingHoverTimer);
  
  ebbingHoverTimer = setTimeout(() => {
    if(ebbingCurrentEl !== el) return;
    
    const tooltip = document.getElementById('ebbingTooltip');
    const titleEl = document.getElementById('ebbingTooltipTitle');
    const contentEl = document.getElementById('ebbingTooltipContent');
    const metaEl = document.getElementById('ebbingTooltipMeta');
    const statusEl = document.getElementById('ebbingTooltipStatus');
    
    if(!tooltip || !titleEl || !contentEl) return;
    
    if(el.classList.contains('learn-point-group')){
      const date = el.dataset.date || '';
      const title = el.dataset.title || '';
      const label = el.dataset.label || '';
      
      titleEl.textContent = `学习日 · ${date}`;
      contentEl.textContent = title || '学习内容';
      metaEl.textContent = label || '';
      statusEl.textContent = '点击跳转学习';
    } else {
      const reviewDate = el.dataset.review || '';
      const baseDate = el.dataset.base || '';
      const interval = el.dataset.interval || '';
      const content = el.dataset.content || '';
      const status = el.dataset.status || '';
      
      titleEl.textContent = `复习 · ${reviewDate} (${baseDate} +${interval}天)`;
      contentEl.textContent = content || '已学内容';
      metaEl.textContent = `原学习日: ${baseDate}`;
      statusEl.textContent = `${status} · 点击跳转`;
    }
    
    tooltip.style.display = 'block';
    tooltip.style.opacity = '1';
    
    const rect = el.getBoundingClientRect();
    const container = document.getElementById('ebbingCurveContainer');
    if(!container) return;
    const containerRect = container.getBoundingClientRect();
    
    let left = rect.left - containerRect.left + rect.width/2 - tooltip.offsetWidth/2;
    let top = rect.top - containerRect.top - tooltip.offsetHeight - 10;
    
    if(left < 0) left = 0;
    if(left + tooltip.offsetWidth > container.offsetWidth) left = container.offsetWidth - tooltip.offsetWidth;
    if(top < 0) top = rect.top - containerRect.top + rect.height + 10;
    
    tooltip.style.left = left + 'px';
    tooltip.style.top = top + 'px';
  }, 2000);
}

function hideEbbingTooltip(){
  if(ebbingHoverTimer){
    clearTimeout(ebbingHoverTimer);
    ebbingHoverTimer = null;
  }
  ebbingCurrentEl = null;
  
  const tooltip = document.getElementById('ebbingTooltip');
  if(tooltip){
    tooltip.style.opacity = '0';
    setTimeout(() => { if(tooltip) tooltip.style.display = 'none'; }, 200);
  }
}

function clickEbbingPoint(el, evt){
  if(evt) evt.stopPropagation();
  hideEbbingTooltip();
  
  const route = el.dataset.route || '';
  const reviewDate = el.dataset.review || '';
  const interval = el.dataset.interval || '';
  
  if(!route){
    showToast('暂无学习内容');
    return;
  }
  
  if(el.classList.contains('learn-point-group')){
    const date = el.dataset.date || '';
    navigate(`date/${date}`);
  } else if(route === 'review'){
    showToast(`复习 ${reviewDate} (${interval}天后) 内容`);
    if(location.hash !== '#review'){
      navigate('review');
      setTimeout(()=>{
        const reviewSection = document.querySelector('.card');
        if(reviewSection) reviewSection.scrollIntoView({behavior:'smooth'});
      }, 300);
    } else {
      const reviewSection = document.querySelector('.card');
      if(reviewSection) reviewSection.scrollIntoView({behavior:'smooth'});
    }
  } else if(route.startsWith('date/')){
    navigate(route);
  } else {
    navigate(route);
  }
}

function scrollToEbbingCurve(){
  const container = document.getElementById('ebbingCurveContainer');
  if(container) container.scrollIntoView({behavior:'smooth'});
}

function stripAffixes(word){
  const patterns=[{regex:/^ber([aiueo])/,affix:"ber-",rootPos:3,type:"ber-前缀"},{regex:/^ber/,affix:"ber-",rootPos:3,type:"ber-前缀"},{regex:/^me([mnptkwglrsyhj])/,affix:"me-",rootPos:2,type:"me-前缀"},{regex:/^mem/,affix:"me-",rootPos:3,type:"me-前缀"},{regex:/^men/,affix:"me-",rootPos:3,type:"me-前缀"},{regex:/^meng/,affix:"me-",rootPos:4,type:"me-前缀"},{regex:/^meny/,affix:"me-",rootPos:4,type:"me-前缀"},{regex:/^pe/,affix:"pe-",rootPos:2,type:"pe-前缀"},{regex:/^per/,affix:"per-",rootPos:3,type:"per-前缀"},{regex:/^ter/,affix:"ter-",rootPos:3,type:"ter-前缀"},{regex:/^di/,affix:"di-",rootPos:2,type:"di-前缀"},{regex:/^se/,affix:"se-",rootPos:2,type:"se-前缀"},{regex:/kan$/,affix:"-kan",rootPos:-3,type:"-kan后缀"},{regex:/i$/,affix:"-i",rootPos:-1,type:"-i后缀"},{regex:/an$/,affix:"-an",rootPos:-2,type:"-an后缀"}];
  let results=[];
  for(const p of patterns){if(p.regex.test(word)){let root=p.rootPos>0?word.substring(p.rootPos):word.slice(0,p.rootPos);if(root.endsWith("kan"))root=root.slice(0,-3);else if(root.endsWith("i"))root=root.slice(0,-1);else if(root.endsWith("an"))root=root.slice(0,-2);if(root&&root.length>=2)results.push({affix:p.affix,root,type:p.type});}}
  return results;
}

function updateStats(){
  // 累计新词（去重）
  const allNew = new Set();
  const allRev = new Set();
  Object.values(learningHistory).forEach(h => {
    if(h.vocabNew) h.vocabNew.forEach(w => allNew.add(w));
    if(h.vocabReview) h.vocabReview.forEach(w => allRev.add(w));
  });
  const sNew = allNew.size;
  const sRev = allRev.size;
  const sTotal = Object.keys(vocabDB).length;
  
  // 连续学习天数
  const dates = Object.keys(learningHistory).sort();
  let streak = 0;
  const today = new Date().toISOString().slice(0,10);
  const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
  if(dates.includes(today)) streak = 1;
  else if(dates.includes(yesterday)) streak = 1;
  let checkDate = new Date(Date.now()-(streak?0:86400000));
  while(true){
    const ds = checkDate.toISOString().slice(0,10);
    if(!dates.includes(ds)) break;
    const hasActivity = learningHistory[ds] && (learningHistory[ds].vocabNew.length||learningHistory[ds].vocabReview.length||learningHistory[ds].translations);
    if(!hasActivity) break;
    streak++;
    checkDate = new Date(checkDate.getTime()-86400000);
  }
  
  const e1=document.getElementById("s-new");if(e1)e1.innerText=sNew;
  const e2=document.getElementById("s-rev");if(e2)e2.innerText=sRev;
  const e3=document.getElementById("s-total");if(e3)e3.innerText=sTotal;
  const e4=document.getElementById("sidebar-streak");if(e4)e4.innerText=streak;
  const e5=document.getElementById("sidebar-today");if(e5)e5.innerText=today;
}

let wordStats = JSON.parse(localStorage.getItem("bir_ws3") || "{}");

function initMember() {
  if (!memberInfo) {
    memberInfo = { username: null, type: null, trialStart: null, trialEnd: null, paidStart: null, paidEnd: null, clickCount: 0, isAdmin: false };
    saveMember();
  }
  checkMemberExpiry();
}
function checkMemberExpiry() {
  const now = new Date();
  if (memberInfo.type === 'trial' && memberInfo.trialEnd && now > new Date(memberInfo.trialEnd)) { memberInfo.type = 'expired'; memberInfo.trialEnd = null; saveMember(); }
  if (memberInfo.type === 'paid' && memberInfo.paidEnd && now > new Date(memberInfo.paidEnd)) { memberInfo.type = 'expired'; memberInfo.paidEnd = null; saveMember(); }
}
function saveMember() { localStorage.setItem("bir_member", JSON.stringify(memberInfo)); }
function isMemberValid() { checkMemberExpiry(); if (!memberInfo) return false; if (memberInfo.isAdmin) return true; if (memberInfo.type === 'trial' || memberInfo.type === 'paid') return true; return false; }
function getMemberStatus() {
  checkMemberExpiry();
  if (!memberInfo || !memberInfo.type || memberInfo.type === 'expired') return { valid: false, label: '非会员', color: 'var(--danger)' };
  if (memberInfo.isAdmin) return { valid: true, label: '超级管理员', color: 'var(--accent)' };
  if (memberInfo.type === 'trial')

function initWordBank() {
  let changed = false;
  Object.keys(vocabDB).forEach(k => {
    const v = vocabDB[k];
    if (!v.cn) return;
    const existing = wordBank.find(w => w.word.toLowerCase() === k.toLowerCase());
    if (!existing) {
      wordBank.push({
        word: k, ipa: v.ipa || "—", cn: v.cn || "—", en: v.en || "—",
        root: v.root || "—", tag: v.tag || "—",
        date: new Date().toISOString().slice(0,10),
        mastered: false,
        passed: { id2zh: false, zh2id: false, spell: false },
        stats: { id2zh: {c:0,w:0}, zh2id: {c:0,w:0}, spell: {c:0,w:0}, totalWrong: 0 },
        reviews: [], nextReview: null, lastReview: null
      });
      changed = true;
    } else if (!existing.passed) {
      existing.passed = { id2zh: false, zh2id: false, spell: false };
      existing.stats = { id2zh: {c:0,w:0}, zh2id: {c:0,w:0}, spell: {c:0,w:0}, totalWrong: 0 };
      changed = true;
    }
  });
  if (changed) { saveWB(); saveWordStats(); }
}

function getWordStat(word) {
  if (!wordStats[word]) {
    wordStats[word] = { id2zh: {c:0,w:0}, zh2id: {c:0,w:0}, spell: {c:0,w:0}, totalWrong: 0 };
  }
  return wordStats[word];
}

function getDynamicInterval(word) {
  const st = getWordStat(word);
  const total = st.id2zh.c + st.id2zh.w + st.zh2id.c + st.zh2id.w + st.spell.c + st.spell.w;
  const wrong = st.id2zh.w + st.zh2id.w + st.spell.w;
  const rate = total > 0 ? wrong / total : 0.5;
  const base = [1, 2, 4, 7, 15, 30, 60, 90];
  let factor = 1;
  if (rate > 0.5) factor = 0.5;
  else if (rate > 0.3) factor = 0.7;
  else if (rate > 0.1) factor = 0.9;
  return base.map(iv => Math.max(1, Math.round(iv * factor)));
}

function recordGameResult(word, mode, isCorrect) {
  const st = getWordStat(word);
  if (isCorrect) { st[mode].c++; } else { st[mode].w++; st.totalWrong++; }
  saveWordStats();
  const wb = wordBank.find(w => w.word.toLowerCase() === word.toLowerCase());
  if (wb) { wb.stats = JSON.parse(JSON.stringify(st)); saveWB(); }
}

function checkAllPassed(word) {
  const wb = wordBank.find(w => w.word.toLowerCase() === word.toLowerCase());
  if (!wb || !wb.passed) return false;
  return wb.passed.id2zh && wb.passed.zh2id && wb.passed.spell;
}

function checkCanRemove(word) { return checkAllPassed(word); }
function getWBItem(word) { return wordBank.find(w => w.word.toLowerCase() === word.toLowerCase()); }

function renderGame(c) {
  c.innerHTML = `<div class="card"><div class="card-header"><h2>🎮 百词斩复习</h2><span class="badge">艾宾浩斯动态间隔</span></div>
  <div id="gameArea"><div style="text-align:center;padding:30px;color:var(--text-dim)">

    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="trans-btn" onclick="startGame('id2zh')">🇮🇩→🇨🇳 印尼选中</button>

  </div></div></div>`;

function startGame(mode) {if(!checkAccess("百词斩"))return;
  const now = Date.now();
  let candidates = wordBank.filter(w => {
    if (!w.cn || checkAllPassed(w.word)) return false;
    const st = getWordStat(w.word);
    const total = st.id2zh.c + st.id2zh.w + st.zh2id.c + st.zh2id.w + st.spell.c + st.spell.w;
    if (total === 0) return true;
    const days = Math.floor((now - new Date(w.date).getTime()) / 86400000);
    const intervals = getDynamicInterval(w.word);
    for (let iv of intervals) { if (days >= iv && days < iv + 2) return true; }
    if (days > 90) return true;
    return false;
  });
  if (candidates.length < 10) {
    const extra = wordBank.filter(w => w.cn && !checkAllPassed(w.word) && !candidates.includes(w));
    candidates = candidates.concat(extra).slice(0, 20);
  }
  if (candidates.length === 0) {
    document.getElementById("gameArea").innerHTML = `<div style="text-align:center;padding:40px;color:var(--text-dim)"><div style="font-size:48px">🎉</div><div>所有词汇三关已通过！</div></div>`;
    return;
  }
  // 按错误率排序后，随机打乱，确保下一组不同
  candidates.sort((a, b) => {
    const sa = getWordStat(a.word), sb = getWordStat(b.word);
    return (sb.id2zh.w + sb.zh2id.w + sb.spell.w) - (sa.id2zh.w + sa.zh2id.w + sa.spell.w);
  });
  // Fisher-Yates shuffle
  for (let i = candidates.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
  }
  const poolSize = Math.min(10, candidates.length);
  gameState = { mode, pool: candidates.slice(0, poolSize), current: null, q: 0, correct: 0, wrong: 0, total: poolSize, streak: 0, wrongAnswers: [] };
  showGameQ();
}

function showGameQ() {
  if (gameState.q >= gameState.total) { showGameResult(); return; }
  const w = gameState.pool[gameState.q];
  gameState.current = w;
  const area = document.getElementById("gameArea");
  const st = getWordStat(w.word);
  const total = st.id2zh.c + st.id2zh.w + st.zh2id.c + st.zh2id.w + st.spell.c + st.spell.w;
  const wrongRate = total > 0 ? (st.id2zh.w + st.zh2id.w + st.spell.w) / total : 0.5;
  const urgency = wrongRate > 0.5 ? '🔴' : wrongRate > 0.2 ? '🟡' : '🟢';

  if (gameState.mode === 'id2zh') {
    const allWords = wordBank.filter(x => x.cn && x.word !== w.word).map(x => x.cn);
    const wrong = [];
    while (wrong.length < 3 && allWords.length) {
      const r = allWords[Math.floor(Math.random() * allWords.length)];
      if (!wrong.includes(r) && r !== w.cn) wrong.push(r);
    }
    const opts = [w.cn, ...wrong].sort(() => Math.random() - 0.5);
    area.innerHTML = `<div style="margin-bottom:12px;font-size:13px;color:var(--text-dim)">${gameState.q+1}/${gameState.total} · ${urgency} 错误率${Math.round(wrongRate*100)}%</div>
      <div class="quiz-card"><div class="q-text" style="font-size:18px">「${w.word}」${w.ipa ? `<span style="font-size:13px;color:var(--text-dim)">${w.ipa}</span>` : ''}</div>
      <div style="font-size:12px;color:var(--text-dim);margin-bottom:10px">选择正确的中文释义</div>
      ${opts.map((opt, i) => `<div class="q-opt" onclick="ansGameQ('${opt.replace(/'/g, "\\'")}', '${w.cn.replace(/'/g, "\\'")}', this)">${String.fromCharCode(65+i)}. ${opt}</div>`).join('')}
      </div>`;
  } else if (gameState.mode === 'zh2id') {
    const allWords = wordBank.filter(x => x.word !== w.word).map(x => x.word);
    const wrong = [];
    while (wrong.length < 3 && allWords.length) {
      const r = allWords[Math.floor(Math.random() * allWords.length)];
      if (!wrong.includes(r) && r !== w.word) wrong.push(r);
    }
    const opts = [w.word, ...wrong].sort(() => Math.random() - 0.5);
    area.innerHTML = `<div style="margin-bottom:12px;font-size:13px;color:var(--text-dim)">${gameState.q+1}/${gameState.total} · ${urgency} 错误率${Math.round(wrongRate*100)}%</div>
      <div class="quiz-card"><div class="q-text" style="font-size:18px">「${w.cn}」</div>
      <div style="font-size:12px;color:var(--text-dim);margin-bottom:10px">选择正确的印尼语单词</div>
      ${opts.map((opt, i) => `<div class="q-opt" onclick="ansGameQ('${opt.replace(/'/g, "\\'")}', '${w.word.replace(/'/g, "\\'")}', this)">${String.fromCharCode(65+i)}. ${opt}</div>`).join('')}
      </div>`;
  } else {
    area.innerHTML = `<div style="margin-bottom:12px;font-size:13px;color:var(--text-dim)">${gameState.q+1}/${gameState.total} · ${urgency} 错误率${Math.round(wrongRate*100)}%</div>
      <div class="quiz-card"><div class="q-text" style="font-size:18px">「${w.cn}」</div>
      <div style="font-size:12px;color:var(--text-dim);margin-bottom:10px">请拼写出对应的印尼语单词</div>
      <div style="font-size:11px;color:var(--accent);margin-bottom:10px">提示: IPA ${w.ipa || '—'} | 词根: ${w.root || '—'}</div>
      <input type="text" id="spellInput" style="width:100%;padding:10px;background:var(--bg-elev);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px" placeholder="输入印尼语..." autocomplete="off" />
      <div style="margin-top:10px"><button class="trans-btn" onclick="submitSpell('${w.word.replace(/'/g, "\\'")}', '${w.cn.replace(/'/g, "\\'")}')">提交</button></div>
      </div>`;
    setTimeout(() => { const inp = document.getElementById("spellInput"); if (inp) inp.focus(); }, 50);
  }
}

function ansGameQ(sel, correct, el) {if(!checkAccess("答题"))return;
  const opts = el.parentElement.querySelectorAll(".q-opt");
  opts.forEach(o => o.style.pointerEvents = "none");
  const ok = sel === correct;
  if (ok) {
    el.style.background = "rgba(34,197,94,.2)"; el.style.borderColor = "var(--success)"; el.style.color = "var(--success)";
    gameState.correct++; gameState.streak++;
    showToast(`✅ 正确！连对${gameState.streak}题`);
  } else {
    el.style.background = "rgba(239,68,68,.2)"; el.style.borderColor = "var(--danger)"; el.style.color = "var(--danger)";
    opts.forEach(o => { if (o.innerText.includes(correct)) { o.style.background = "rgba(34,197,94,.2)"; o.style.borderColor = "var(--success)"; o.style.color = "var(--success)"; } });
    gameState.wrong++; gameState.streak = 0;
    showToast(`❌ 错误！正确答案是「${correct}」`);
    gameState.wrongAnswers.push({
      word: gameState.current.word,
      question: gameState.mode === 'id2zh' ? gameState.current.word : gameState.current.cn,
      correctAnswer: correct,
      userAnswer: sel,
      mode: gameState.mode
    });
  }
  recordGameResult(gameState.current.word, gameState.mode, ok);
  if (ok) {
    const wb = getWBItem(gameState.current.word);
    if (wb) { wb.passed[gameState.mode] = true; saveWB(); }
  }
  gameState.q++;
  setTimeout(() => showGameQ(), 1500);
}

function submitSpell(correctWord, correctCn) {if(!checkAccess("拼写"))return;
  const inp = document.getElementById("spellInput");
  if (!inp) return;
  const val = inp.value.trim().toLowerCase();
  const ok = val === correctWord.toLowerCase();
  if (ok) {
    showToast(`✅ 拼写正确！`);
    recordGameResult(correctWord, 'spell', true);
    const wb = getWBItem(correctWord);
    if (wb) { wb.passed.spell = true; saveWB(); }
  } else {
    showToast(`❌ 错误！正确答案是「${correctWord}」`);
    recordGameResult(correctWord, 'spell', false);
    gameState.wrongAnswers.push({
      word: correctWord,
      question: correctCn || correctWord,
      correctAnswer: correctWord,
      userAnswer: val,
      mode: 'spell'
    });
    const area = document.getElementById("gameArea");
    area.innerHTML += `<div style="margin-top:10px;padding:10px;background:rgba(239,68,68,.1);border-radius:8px;color:var(--danger);font-size:13px">正确答案: ${correctWord}</div>`;
  }
  gameState.q++;
  setTimeout(() => showGameQ(), ok ? 1000 : 2000);
}

function startGameWithPool(mode, poolIds) {
  if(!checkAccess("百词斩"))return;
  const ids = poolIds.split(',');
  const pool = [];
  ids.forEach(id => { const w = getWBItem(id); if (w) pool.push(w); });
  if (pool.length === 0) { showToast('词汇池为空'); return; }
  gameState = { mode, pool, current: 0, q: [], correct: 0, wrong: 0, total: pool.length, streak: 0 };
  showGameQ();
}
function showGameResult() {
  const pct = gameState.total > 0 ? Math.round((gameState.correct / gameState.total) * 100) : 0;
  const msg = pct >= 80 ? "优秀！" : pct >= 60 ? "不错！" : "需多练习！";
  const newPassed = gameState.pool.filter(w => checkAllPassed(w.word)).length;
  const poolIds = gameState.pool.map(w => w.word).join(',');
  let nextButtons = '';
  if (gameState.mode === 'id2zh') nextButtons = `<button class="trans-btn" onclick="startGameWithPool('zh2id','${poolIds}')">🇨🇳→🇮🇩 中印测试这组词</button>`;
  else if (gameState.mode === 'zh2id') nextButtons = `<button class="trans-btn" onclick="startGameWithPool('id2zh','${poolIds}')">🇮🇩→🇨🇳 印中测试这组词</button><button class="trans-btn" style="margin-top:8px;" onclick="startGameWithPool('spell','${poolIds}')">✏️ 拼写这组词</button>`;
  else if (gameState.mode === 'spell') nextButtons = `<button class="trans-btn" onclick="startGameWithPool('id2zh','${poolIds}')">🇮🇩→🇨🇳 印中测试这组词</button>`;
  
  // 错题报告
  let wrongReport = '';
  if (gameState.wrongAnswers && gameState.wrongAnswers.length > 0) {
    wrongReport = `<div style="margin:16px 0;text-align:left;"><div style="font-size:14px;font-weight:700;color:var(--danger);margin-bottom:8px;">📋 错题报告 (${gameState.wrongAnswers.length}题)</div>`;
    gameState.wrongAnswers.forEach((wa, i) => {
      const modeLabel = wa.mode === 'id2zh' ? '🇮🇩→🇨🇳' : wa.mode === 'zh2id' ? '🇨🇳→🇮🇩' : '✏️拼写';
      wrongReport += `<div style="padding:8px;background:var(--bg-elev);border-radius:8px;margin-bottom:6px;border-left:3px solid var(--danger);">
        <div style="font-size:12px;color:var(--text-dim);margin-bottom:2px;">${i+1}. ${modeLabel} ${wa.question}</div>
        <div style="font-size:13px;"><span style="color:var(--danger)">你的答案: ${wa.userAnswer || '(空)'}</span> → <span style="color:var(--success)">正确答案: ${wa.correctAnswer}</span></div>
      </div>`;
    });
    wrongReport += `</div>`;
  }
  
  document.getElementById("gameArea").innerHTML = `<div style="text-align:center;padding:30px">
    <div style="font-size:56px;margin-bottom:10px">${pct >= 80 ? "🎉" : pct >= 60 ? "👍" : "💪"}</div>
    <div style="font-size:28px;font-weight:700;color:var(--primary)">${pct}%</div>
    <div style="color:var(--text-dim);margin:8px 0">${gameState.correct}/${gameState.total} 正确 · ${gameState.wrong} 错误</div>
    <div style="color:var(--text);margin-bottom:10px">${msg}</div>
    <div style="font-size:13px;color:var(--success);margin-bottom:16px">${newPassed > 0 ? `本次通关 ${newPassed} 个词！` : ""}</div>
    ${wrongReport}
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;flex-direction:column;align-items:center;">
      ${nextButtons}
      <button class="trans-btn" style="background:transparent;border:1px solid var(--primary);color:var(--primary);" onclick="startGame('${gameState.mode}')">🔄 下一组新词</button>
      <button class="trans-btn" style="background:transparent;color:var(--text-dim);" onclick="navigate('home')">🏠 返回主页</button>
    </div></div>`;
}

function playWBGame(i) {if(!checkAccess("生词练习"))return;

function delWB(i){

    }
  });

}

function markWordReviewed(word, interval) {
  const w = wordBank.find(x => x.word === word);

    if (!w.reviews) w.reviews = [];

    const nextIdx = intervals.indexOf(interval) + 1;

  let h = `<div class="cal-wrap"><div class="cal-header"><button class="cal-nav" onclick="changeMonth(-1)">◀</button><h3>${y}年${m+1}月</h3><button class="cal-nav" onclick="changeMonth(1)">▶</button></div><div class="cal-grid">`;
  wd.forEach(d => h += `<div class="cal-wd">${d}</div>`);
  for (let i = 0; i < fd; i++) h += `<div class="cal-day" style="background:transparent;cursor:default"></div>`;
  for (let d = 1; d <= td; d++) {
    const ds = `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const data = learningHistory[ds], ist = ds === tds, hd = data && (data.vocabNew.length || data.vocabReview.length || data.translations);
    const tinfo = getTopicForDate(ds);
    let dots = "";
    if (data) {
      if (data.vocabNew.length) dots += `<span class="ddot neww"></span>`;
      if (data.vocabReview.length) dots += `<span class="ddot rev"></span>`;
      if (data.translations) dots += `<span class="ddot"></span>`;
    }
    if (tinfo) dots += `<span class="ddot" style="background:var(--accent)"></span>`;
    h += `<div class="cal-day ${ist ? "today" : ""} ${hd || tinfo ? "has-data" : ""}" data-date="${ds}"><div class="dnum">${d}</div><div class="ddots">${dots}</div></div>`;
  }
  h += `</div><div class="cal-legend"><span><span class="ddot neww" style="display:inline-block"></span> 新词</span><span><span class="ddot rev" style="display:inline-block"></span> 复习</span><span><span class="ddot" style="display:inline-block"></span> 翻译</span><span><span class="ddot" style="display:inline-block;background:var(--accent)"></span> 话题</span><span>⬤ 今天</span></div></div>`;
  return h;
};

// ===== AI对话功能 =====
let aiChatHistory = [];
let isRecording = false;
let recognition = null;

function initAIChat() {
  // 检查浏览器支持
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    console.log('Speech recognition not supported');
  }
}

function startVoiceInput() {
  if (!window.speechSynthesis) {
    showToast('❌ 浏览器不支持语音识别');
    return;
  }
  
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    showToast('❌ 浏览器不支持语音识别，请手动输入');
    return;
  }
  
  recognition = new SpeechRecognition();
  recognition.lang = 'id-ID'; // 印尼语
  recognition.continuous = false;
  recognition.interimResults = false;
  
  recognition.onstart = () => {
    isRecording = true;
    showToast('🎤 正在聆听...');
    const btn = document.getElementById('aiVoiceBtn');
    if(btn) btn.style.background = 'var(--danger)';
  };
  
  recognition.onresult = (event) => {
    const text = event.results[0][0].transcript;
    const input = document.getElementById('aiChatInput');
    if(input) input.value = text;
    sendAIChat(text);
  };
  
  recognition.onerror = (event) => {
    console.error('Speech recognition error', event.error);
    showToast('❌ 语音识别出错: ' + event.error);
    isRecording = false;
    const btn = document.getElementById('aiVoiceBtn');
    if(btn) btn.style.background = 'var(--primary)';
  };
  
  recognition.onend = () => {
    isRecording = false;
    const btn = document.getElementById('aiVoiceBtn');
    if(btn) btn.style.background = 'var(--primary)';
  };
  
  recognition.start();
}

function stopVoiceInput() {
  if(recognition) recognition.stop();
  isRecording = false;
}

function sendAIChat(text) {
  if(!text || !text.trim()) return;
  text = text.trim();
  
  const chatArea = document.getElementById('aiChatArea');
  if(!chatArea) return;
  
  // 添加用户消息
  chatArea.innerHTML += `<div style="display:flex;justify-content:flex-end;margin:8px 0;"><div style="background:var(--primary);color:#0a0e17;padding:8px 12px;border-radius:12px 12px 0 12px;max-width:80%;font-size:13px;">${text}</div></div>`;
  chatArea.scrollTop = chatArea.scrollHeight;
  
  // 显示加载中
  const loadingId = 'ai-loading-' + Date.now();
  chatArea.innerHTML += `<div id="${loadingId}" style="display:flex;justify-content:flex-start;margin:8px 0;"><div style="background:var(--bg-elev);color:var(--text);padding:8px 12px;border-radius:12px 12px 12px 0;max-width:80%;font-size:13px;border:1px solid var(--border);"><div style="font-size:11px;color:var(--primary);margin-bottom:2px;">🤖 AI Assistant</div>⏳ 思考中...</div></div>`;
  chatArea.scrollTop = chatArea.scrollHeight;
  
  // 智能回复逻辑
  const lowerText = text.toLowerCase();
  
  // 1. 检查是否是单词查询
  const cleanWord = text.replace(/[^a-zA-Z]/g, '').toLowerCase();
  let vocabMatch = vocabDB[cleanWord];
  if(!vocabMatch && text.length < 20){
    const prefixes = ['me','meng','meny','men','mem','ber','be','di','ter','pe','peng','peny','pen','pem','se'];
    for(const p of prefixes){
      if(cleanWord.startsWith(p) && cleanWord.length > p.length + 2){
        const root = cleanWord.slice(p.length);
        if(vocabDB[root]){ vocabMatch = vocabDB[root]; break; }
      }
    }
  }
  
  if(vocabMatch){
    const reply = `Kata "${text}" dalam Bahasa Indonesia:
• Arti: ${vocabMatch.cn}
• English: ${vocabMatch.en || '-'}
• IPA: ${vocabMatch.ipa || '/'}
• ${vocabMatch.root ? 'Asal kata: ' + vocabMatch.root : ''}`.trim();
    showAIReply(reply, text, loadingId);
    return;
  }
  
  // 2. 使用翻译API获取印尼语回复
  const q = encodeURIComponent(text);
  fetch(`https://api.mymemory.translated.net/get?q=${q}&langpair=zh-CN|id`)
    .then(r => r.json())
    .then(data => {
      let reply = '';
      if(data && data.responseData && data.responseData.translatedText){
        const translated = data.responseData.translatedText;
        reply = `${translated}

（中文原文：${text}）`;
      } else {
        reply = generateAIReply(text);
      }
      showAIReply(reply, text, loadingId);
    })
    .catch(() => {
      const reply = generateAIReply(text);
      showAIReply(reply, text, loadingId);
    });
}

function generateAIReply(text){
  const lower = text.toLowerCase();
  if(/你好|您好|hi|hello|hey/.test(lower)){
    return `Halo! Selamat datang! Saya asisten belajar Bahasa Indonesia Anda. Apa yang ingin Anda pelajari hari ini?

（你好！欢迎！我是你的印尼语学习助手。今天你想学什么？）`;
  }
  if(/谢谢|terima kasih|thanks/.test(lower)){
    return `Sama-sama! Senang bisa membantu Anda.

（不客气！很高兴能帮助您。）`;
  }
  if(/再见|selamat tinggal|bye|goodbye/.test(lower)){
    return `Selamat tinggal! Semoga harimu menyenangkan!

（再见！祝您有愉快的一天！）`;
  }
  if(/名字|nama|name/.test(lower)){
    return `Nama saya LEO-BIR Assistant. Saya di sini untuk membantu Anda belajar Bahasa Indonesia.

（我的名字是LEO-BIR助手。我在这里帮助您学习印尼语。）`;
  }
  if(/怎么|如何|bagaimana|how/.test(lower)){
    return `Bagaimana cara mengucapkannya? Mari kita latih bersama-sama!

（怎么发音？让我们一起练习！）`;
  }
  return `Baik, saya mengerti. Mari kita lanjutkan belajar Bahasa Indonesia bersama-sama. Anda bisa bertanya tentang kosakata atau percakapan.

（好的，我明白了。让我们一起继续学习印尼语。您可以询问词汇或对话。）`;
}

function showAIReply(reply, userText, loadingId){
  const chatArea = document.getElementById('aiChatArea');
  if(!chatArea) return;
  
  const loadingEl = document.getElementById(loadingId);
  if(loadingEl) loadingEl.remove();
  
  const safeReply = reply.replace(/'/g, "\'");
  chatArea.innerHTML += `<div style="display:flex;justify-content:flex-start;margin:8px 0;"><div style="background:var(--bg-elev);color:var(--text);padding:8px 12px;border-radius:12px 12px 12px 0;max-width:80%;font-size:13px;border:1px solid var(--border);"><div style="font-size:11px;color:var(--primary);margin-bottom:2px;">🤖 AI Assistant</div><div style="white-space:pre-line;">${reply}</div><button onclick="speakIndonesian('${safeReply.split('\n')[0]}')" style="background:none;border:none;color:var(--primary);cursor:pointer;font-size:12px;padding:2px;margin-left:4px;" title="朗读印尼语">🔊</button></div></div>`;
  chatArea.scrollTop = chatArea.scrollHeight;
  
  const idPart = reply.split('（')[0].trim();
  if(idPart) speakIndonesian(idPart);
  
  if(typeof aiChatHistory !== 'undefined'){
    aiChatHistory.push({user: userText, ai: reply});
  }
}

function showWordPopup(word){
  const clean = word.toLowerCase().replace(/[^a-z]/g,'');
  let v = vocabDB[clean] || vocabDB[word.toLowerCase()];

    const prefixes = [['me','meng','meny','men','mem','me'],['ber','be'],['di'],['ter'],['pe','peng','peny','pen','pem'],['se']];
    for(const group of prefixes){
      for(const p of group){
        if(clean.startsWith(p) && clean.length>p.length+2){
          const root = clean.slice(p.length);
          v = vocabDB[root];
          if(v) break;
          const changes = {m:'p',n:'t',ng:'k',ny:'s',r:''};
          for(const [to,from] of Object.entries(changes)){
            if(root.startsWith(to)){
              v = vocabDB[from+root.slice(to.length)];
              if(v) break;
            }
          }
        }
        if(v) break;
      }

    </div>
    <button id="wordPopupQueryBtn" data-word="${word}" style="width:100%;padding:8px;background:var(--info);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;margin-bottom:8px;">🔍 查询更多（三语）</button>
    <button id="wordPopupAddBtn" data-wid="${wid}" style="width:100%;padding:10px;background:${inWB?'var(--bg-elev)':'var(--primary)'};color:${inWB?'var(--text-dim)':'#0a0e17'};border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;" ${inWB?'disabled':''}>${inWB?'✅ 已在生词本':'📚 加入生词本'}</button>`;
  } else {
    cardHTML += `<div style="text-align:center;padding:20px 0;"><div style="font-size:36px;margin-bottom:12px;">🔍</div><div style="font-size:14px;color:var(--text-dim);margin-bottom:8px;">「${word}」未收录</div><div style="font-size:12px;color:var(--text-dim);margin-bottom:12px;">可在线查询或手动录入</div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:8px;background:var(--bg-elev);border-radius:8px;">
      <input type="checkbox" id="wbCheck" style="width:16px;height:16px;cursor:pointer;">
      <label for="wbCheck" style="font-size:13px;color:var(--text);cursor:pointer;">加入生词本</label>
    </div>
    <button id="wordPopupQueryBtn" data-word="${word}" style="width:100%;padding:8px;background:var(--info);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;margin-bottom:8px;">🔍 查询更多（三语）</button>
    <button id="wordPopupInputBtn" data-word="${word}" style="width:100%;padding:8px;background:var(--accent);color:#0a0e17;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;margin-bottom:8px;">📝 录入词汇</button>
    <button id="wordPopupAddBtn" data-wid="${clean}" data-word="${word}" style="width:100%;padding:10px;background:var(--primary);color:#0a0e17;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">📚 加入生词本</button></div>`;
  }
  
  cardHTML += `</div>`;
  overlay.innerHTML = cardHTML;
  document.body.appendChild(overlay);
  
  // 事件绑定（必须在appendChild之后！）
  const closeBtn = document.getElementById('wordPopupClose');
  if(closeBtn){
    closeBtn.addEventListener('click', closeWordPopup);
    closeBtn.addEventListener('touchend', (e)=>{e.preventDefault();closeWordPopup();});
  }
  
  const addBtn = document.getElementById('wordPopupAddBtn');
  if(addBtn) addBtn.addEventListener('click',()=>{
    const wid = addBtn.dataset.wid;
    addToWBFromPopup(wid);
    const cb = document.getElementById('wbCheck');
    if(cb) cb.checked = true;
  });
  
  const queryBtn = document.getElementById('wordPopupQueryBtn');
  if(queryBtn) queryBtn.addEventListener('click',()=>{
    const w = queryBtn.dataset.word;
    doWordQuery(w);
  });
  
  const inputBtn = document.getElementById('wordPopupInputBtn');
  if(inputBtn) inputBtn.addEventListener('click',()=>{
    const w = inputBtn.dataset.word;
    closeWordPopup();
    navigate('input');
    setTimeout(()=>{
      const vInput = document.getElementById('vInput');
      if(vInput) vInput.value = w;
    }, 300);
  });
  
  overlay.addEventListener('click',(e)=>{
    if(e.target===overlay) closeWordPopup();
  });
}

function doWordQuery(word){
  const overlay = document.createElement('div');
  overlay.id = 'wordQueryOverlay';
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:10000;display:flex;align-items:center;justify-content:center;padding:16px;';
  overlay.innerHTML = `<div style="background:var(--bg-card);border-radius:16px;padding:20px;max-width:400px;width:100%;border:1px solid var(--border);max-height:90vh;overflow-y:auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div style="font-size:16px;font-weight:700;color:var(--primary);">🔍 "${word}" 三语查询</div>
      <button onclick="document.getElementById('wordQueryOverlay').remove()" style="background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;">✕</button>
    </div>
    <div id="queryResult" style="font-size:13px;color:var(--text);">
      <div style="text-align:center;padding:20px;">⏳ 查询中...</div>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  
  const clean = word.toLowerCase().replace(/[^a-z]/g,'');
  let v = vocabDB[clean] || vocabDB[word.toLowerCase()];
  let resultHtml = '';
  
  if(v){
    resultHtml += `<div style="margin-bottom:12px;padding:10px;background:var(--bg-elev);border-radius:8px;">
      <div style="font-size:14px;font-weight:600;color:var(--primary);margin-bottom:4px;">${word}</div>
      <div style="font-size:12px;color:var(--text-dim);">IPA: ${v.ipa||'/'}</div>
    </div>`;
    resultHtml += `<div style="margin-bottom:12px;"><div style="font-size:12px;color:var(--text-dim);margin-bottom:4px;">🇨🇳 中文</div><div style="font-size:15px;color:var(--text);font-weight:600;">${v.cn}</div></div>`;
    resultHtml += `<div style="margin-bottom:12px;"><div style="font-size:12px;color:var(--text-dim);margin-bottom:4px;">🇬🇧 English</div><div style="font-size:14px;color:var(--text);">${v.en||'-'}</div></div>`;
    resultHtml += `<div style="margin-bottom:12px;"><div style="font-size:12px;color:var(--text-dim);margin-bottom:4px;">🇮🇩 Bahasa Indonesia</div><div style="font-size:14px;color:var(--text);">${word} (原始形式)</div></div>`;
    if(v.root) resultHtml += `<div style="font-size:11px;color:var(--text-dim);margin-top:8px;">词根: ${v.root}</div>`;
  } else {
    resultHtml += `<div style="text-align:center;padding:20px;"><div style="font-size:36px;margin-bottom:12px;">📖</div><div style="font-size:14px;color:var(--text-dim);">该词汇暂未收录详细信息</div><div style="font-size:12px;color:var(--text-dim);margin-top:8px;">建议通过"词汇录入"功能添加</div></div>`;
  }
  
  document.getElementById('queryResult').innerHTML = resultHtml;
  
  // 在线查询API - Google Translate (更高质量)
  resultHtml += `<div style="margin-top:16px;border-top:1px solid var(--border);padding-top:12px;"><div style="font-size:12px;font-weight:600;color:var(--primary);margin-bottom:8px;">🌐 在线查询结果 (Google Translate)</div><div id="onlineResult"><div style="text-align:center;padding:12px;"><div style="font-size:24px;margin-bottom:8px;">⏳</div><div style="font-size:12px;color:var(--text-dim);">正在查询中...</div></div></div></div>`;
  document.getElementById('queryResult').innerHTML = resultHtml;
  
  // 同时查询印尼语→中文和印尼语→英文
  Promise.all([
    gTrans(word, 'id', 'zh-CN'),
    gTrans(word, 'id', 'en')
  ])
    .then(([zhText, enText]) => {
      let html = '';
      let hasResult = false;
      
      if(zhText && zhText !== word){
        html += `<div style="margin-bottom:10px;padding:10px;background:rgba(59,130,246,.1);border-radius:8px;border-left:3px solid var(--info);"><div style="font-size:11px;color:var(--text-dim);margin-bottom:4px;">🇮🇩→🇨🇳 印尼语→中文</div><div style="font-size:15px;color:var(--text);font-weight:600;">${zhText}</div><div style="font-size:10px;color:var(--text-dim);margin-top:4px;">via Google Translate</div></div>`;
        hasResult = true;
        // 缓存查询结果供生词本使用
        window._lastQueryResult = {word: word, zh: zhText, en: enText || ''};
      }
      
      if(enText && enText !== word){
        html += `<div style="margin-bottom:10px;padding:10px;background:rgba(34,197,94,.1);border-radius:8px;border-left:3px solid var(--success);"><div style="font-size:11px;color:var(--text-dim);margin-bottom:4px;">🇮🇩→🇬🇧 印尼语→English</div><div style="font-size:14px;color:var(--text);">${enText}</div></div>`;
        hasResult = true;
        if(!window._lastQueryResult) window._lastQueryResult = {word: word, zh: '', en: enText};
        else window._lastQueryResult.en = enText;
      }
      
      if(!hasResult){
        html = '<div style="text-align:center;padding:16px;"><div style="font-size:24px;margin-bottom:8px;">📖</div><div style="font-size:13px;color:var(--text-dim);">在线查询暂无结果</div><div style="font-size:11px;color:var(--text-dim);margin-top:4px;">请使用「词汇录入」功能手动添加</div></div>';
      }
      
      document.getElementById('onlineResult').innerHTML = html;
    })
    .catch(err => {
      document.getElementById('onlineResult').innerHTML = '<div style="text-align:center;padding:16px;"><div style="font-size:24px;margin-bottom:8px;">⚠️</div><div style="font-size:13px;color:var(--text-dim);">网络查询失败</div><div style="font-size:11px;color:var(--text-dim);margin-top:4px;">请检查网络连接后重试</div></div>';
    });
}

function closeWordPopup(){
  const el = document.getElementById('wordPopupOverlay');
  if(el) el.remove();
}

function addToWBFromPopup(wordId){
  const v = vocabDB[wordId];
  if(v){
    if(wordBank.some(w=>w.id===v.id)){
      showToast('已在生词本');
      return;
    }
    wordBank.push({id:v.id,word:v.id,zh:v.cn,en:v.en||'',ipa:v.ipa||'',root:v.root||'',passed:{},addTime:Date.now()});
    saveWB();
    updateStats();
    showToast(`已加入: ${v.cn}`);
    closeWordPopup();
    return;
  }
  // 未收录单词：尝试使用最近一次查询结果或在线查询
  const lastQuery = window._lastQueryResult;
  if(lastQuery && lastQuery.word === wordId){
    if(wordBank.some(w=>w.word===wordId)){
      showToast('已在生词本');
      return;
    }
    wordBank.push({id:wordId,word:wordId,zh:lastQuery.zh||wordId,en:lastQuery.en||'',ipa:'—',root:'—',passed:{},addTime:Date.now()});
    saveWB();
    updateStats();
    showToast(`已加入: ${lastQuery.zh || wordId}`);
    closeWordPopup();
    return;
  }
  // 无查询结果，提示先查询
  showToast('请先点击「查询更多」获取翻译');
}


// === 思维导图（三级展开）===
function renderMindMap(c){
  const r = parseRoute();
  const topicKey = r.param || 'meet';
  const topic = topicData[topicKey];
  
  if(!topic){
    c.innerHTML = `<div class="card"><div style="padding:20px;text-align:center;"><div style="font-size:48px;margin-bottom:12px;">🗺️</div><div style="font-size:16px;color:var(--text);">选择话题查看思维导图</div></div></div>`;
    return;
  }
  
  let html = `<div class="card"><div class="card-header"><h2>🗺️ 思维导图 · ${topic.title}</h2><span class="badge">三级展开</span></div><div style="padding:16px;">`;
  
  // 一级：日期节点
  const dates = topicCalendarEntries.filter(e => e.topic === topicKey).map(e => e.date);
  dates.forEach((date, di) => {
    const dayNum = di + 1;
    const tc = topicCalendar[date];
    html += `<div style="margin-bottom:16px;border:1px solid var(--border);border-radius:12px;overflow:hidden;">
      <div onclick="toggleMindLevel(this)" style="padding:14px;background:linear-gradient(90deg,var(--bg-elev),transparent);cursor:pointer;display:flex;align-items:center;gap:10px;">
        <span style="font-size:20px;">📅</span>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:700;color:var(--primary);">Day ${dayNum} · ${date}</div>
          <div style="font-size:12px;color:var(--text-dim);">${tc ? tc.label : '学习内容'}</div>
        </div>
        <span class="mind-toggle" style="font-size:18px;color:var(--text-dim);transition:transform .3s;">▼</span>
      </div>
      <div class="mind-level2" style="display:none;padding:0 14px 14px;">`;
    
    // 二级：内容类型
    if(dayNum === 1){
      // 词汇语法
      html += `<div style="margin-bottom:10px;">
        <div onclick="toggleMindLevel(this)" style="padding:10px;background:var(--bg-card);border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:8px;">
          <span>📚</span><span style="font-weight:600;">词汇与语法</span><span class="mind-toggle" style="margin-left:auto;font-size:14px;">▼</span>
        </div>
        <div class="mind-level3" style="display:none;padding:8px 0 0 28px;">
          <div style="font-size:13px;color:var(--text);margin-bottom:6px;"><strong>${topic.grammar.title}</strong></div>
          ${topic.grammar.rules.map((rule, i) => `<div style="font-size:12px;color:var(--text-dim);margin:3px 0;padding-left:8px;border-left:2px solid var(--primary);">${i+1}. ${rule}</div>`).join('')}
        </div>
      </div>`;
    }
    
    // 场景对话（Day 1和Day 2都有）
    if(dayNum <= 2 && topic.scenes){
      html += `<div style="margin-bottom:10px;">
        <div onclick="toggleMindLevel(this)" style="padding:10px;background:var(--bg-card);border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:8px;">
          <span>🎭</span><span style="font-weight:600;">场景对话 (${topic.scenes.length}个)</span><span class="mind-toggle" style="margin-left:auto;font-size:14px;">▼</span>
        </div>
        <div class="mind-level3" style="display:none;padding:8px 0 0 28px;">
          ${topic.scenes.map((scene, i) => `<div style="font-size:12px;color:var(--text);margin:4px 0;"><span style="color:var(--info);">${scene.icon}</span> ${scene.title}</div>`).join('')}
        </div>
      </div>`;
    }
    
    // 演讲（Day 3）
    if(dayNum === 3 && topic.speeches){
      html += `<div style="margin-bottom:10px;">
        <div onclick="toggleMindLevel(this)" style="padding:10px;background:var(--bg-card);border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:8px;">
          <span>🎤</span><span style="font-weight:600;">演讲 (${topic.speeches.length}篇)</span><span class="mind-toggle" style="margin-left:auto;font-size:14px;">▼</span>
        </div>
        <div class="mind-level3" style="display:none;padding:8px 0 0 28px;">
          ${topic.speeches.map((sp, i) => `<div style="font-size:12px;color:var(--text);margin:4px 0;"><span style="color:var(--accent);">${sp.icon}</span> ${sp.title} (${sp.words}词)</div>`).join('')}
        </div>
      </div>`;
    }
    
    html += `</div></div>`;
  });
  
  html += `</div></div>`;
  c.innerHTML = html;
}

function toggleMindLevel(el){
  const level2 = el.nextElementSibling;
  if(!level2) return;
  const isHidden = level2.style.display === 'none';
  level2.style.display = isHidden ? 'block' : 'none';
  const toggle = el.querySelector('.mind-toggle');
  if(toggle) toggle.style.transform = isHidden ? 'rotate(180deg)' : 'rotate(0deg)';
}

// 艾宾浩斯曲线复习点点击事件（事件委托）
document.addEventListener('click', function(e){
  const point = e.target.closest('.ebbing-point');
  if(point){
    const day = point.dataset.day;
    navigate('mindmap');
  }
