function startAffixGame(level2Key) {
  const diff = DIFFICULTY_CONFIG[prefixGameState.difficulty];
  prefixGameState = {
    active: true, phase: 'play', level1: prefixGameState.level1,
    level2: level2Key, difficulty: prefixGameState.difficulty,
    level: 1, subLevel: 1, score: 0, lives: diff.lives,
    currentWord: null, fallingSpeed: diff.fallingSpeed,
    selectedVariant: null, timer: null,
    wordsCompleted: 0, streak: 0, bestStreak: 0,
    achievements: prefixGameState.achievements || {},
    unlocked: prefixGameState.unlocked || {},
    starRatings: prefixGameState.starRatings || {}
  };
  showAffixGamePlay(document.getElementById('appContent'));
}

// === 游戏主体 ===
function showAffixGamePlay(c) {
  const state = prefixGameState;
  const catData = AFFIX_GAME_DATA[state.level1];
  const level2Data = catData.children[state.level2];
  const variants = level2Data.variants;
  const variantKeys = Object.keys(variants);
  const diff = DIFFICULTY_CONFIG[state.difficulty];

  // 动态词库补充
  const dynamicPool = buildDynamicWordPool();
  
  // 随机选正确答案
  const correctKey = variantKeys[Math.floor(Math.random() * variantKeys.length)];
  const correctVar = variants[correctKey];
  const baseWords = correctVar.words;
  // 混合动态词库
  const allWords = [...baseWords];
  dynamicPool.forEach(dw => {
    if (!allWords.some(w => w.root === dw.root)) allWords.push(dw);
  });
  const word = allWords[Math.floor(Math.random() * allWords.length)];
  state.currentWord = { ...word, correctVariant: correctKey };

  // 生成选项
  let options = [correctKey];
  const allVariantKeys = [];
  // 收集所有可用变体
  if (diff.crossCategory) {
    // 困难模式：从所有二级分类中找干扰项
    Object.values(AFFIX_GAME_DATA).forEach(cat => {
      Object.values(cat.children).forEach(child => {
        Object.keys(child.variants).forEach(k => {
          if (!allVariantKeys.includes(k)) allVariantKeys.push(k);
        });
      });
    });
  } else {
    // 简单/中等：从当前二级分类中找干扰项
    variantKeys.forEach(k => { if (!allVariantKeys.includes(k)) allVariantKeys.push(k); });
  }
  const others = allVariantKeys.filter(k => k !== correctKey);
  while (options.length < diff.options && others.length > 0) {
    const idx = Math.floor(Math.random() * others.length);
    const opt = others.splice(idx, 1)[0];
    if (!options.includes(opt)) options.push(opt);
  }
  options.sort(() => Math.random() - 0.5);

  const progress = ((state.subLevel - 1) / 10) * 100;
  const ruleBg = level2Data.rule || level2Data.desc;
  const isVowelStart = /^[aiueo]/.test(word.root);
  const firstLetter = word.root[0];

  // 随机水平位置
  const randomPos = 10 + Math.random() * 60;

  c.innerHTML = `
    <div class="card" style="min-height:560px;display:flex;flex-direction:column;position:relative;overflow:hidden;">
      ${state.streak >= 3 ? `<div id="comboOverlay" style="position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:10;background:radial-gradient(circle at 50% 30%, rgba(255,107,53,.15) 0%, transparent 60%);animation:comboPulse 1s ease-out;"></div>` : ''}
      
      <div class="card-header" style="flex-wrap:wrap;gap:8px;position:relative;z-index:5;">
        <h2>🎯 ${level2Data.name}</h2>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <span class="badge" style="background:rgba(59,130,246,.15);color:#3b82f6">${diff.label}</span>
          <span class="badge" style="background:var(--accent)20;color:var(--accent)">大关 ${state.level}</span>
          <span class="badge" style="background:var(--info)20;color:var(--info)">小关 ${state.subLevel}/10</span>
          <span class="badge" style="background:var(--danger)20;color:var(--danger)">❤️ ${state.lives}</span>
          <span class="badge">⭐ ${state.score}</span>
          ${state.streak > 1 ? `<span class="badge" style="background:linear-gradient(90deg,#ff6b35,#ff9f43);color:#fff;border:none;animation:comboBadge .5s ease-out">🔥 ${state.streak}连击</span>` : ''}
        </div>
      </div>

      <div style="padding:16px;flex:1;display:flex;flex-direction:column;position:relative;z-index:5;">
        <!-- 规则背景条 -->
        <div style="background:linear-gradient(90deg,rgba(0,212,170,.1),rgba(59,130,246,.08));border:1px solid rgba(0,212,170,.2);border-radius:10px;padding:12px 16px;margin-bottom:12px;font-size:12px;color:var(--text-dim);line-height:1.7;">
          <strong style="color:var(--primary)">📜 规则：</strong>${ruleBg}
        </div>

        <!-- 进度条 -->
        <div style="background:var(--bg-elev);border-radius:8px;height:6px;overflow:hidden;margin-bottom:12px;">
          <div style="background:var(--primary);width:${progress}%;height:100%;transition:width .3s;border-radius:8px;box-shadow:0 0 8px rgba(0,212,170,.5);"></div>
        </div>

        <!-- 游戏区域 -->
        <div id="gameArena" style="flex:1;background:var(--bg-elev);border-radius:14px;border:1px solid var(--border);position:relative;overflow:hidden;min-height:280px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;">
          <!-- 粒子容器 -->
          <div id="particleContainer" style="position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:20;"></div>
          
          <!-- 下落的词根 -->
          <div id="fallingWord" style="position:absolute;top:20px;left:${randomPos}%;transform:translateX(-50%);font-size:36px;font-weight:900;color:var(--primary);padding:20px 32px;background:linear-gradient(135deg,var(--bg-card),rgba(0,212,170,.1));border-radius:16px;border:2px solid var(--primary);box-shadow:0 0 30px rgba(0,212,170,.2),0 4px 20px rgba(0,0,0,.3);animation:affixFall ${state.fallingSpeed}ms linear forwards;z-index:5;">
            ${word.root}
          </div>
          
          <div style="margin-top:80px;font-size:15px;color:var(--text-dim);font-weight:500;">🇨🇳 ${word.cn}</div>
          <div style="font-size:12px;color:var(--accent);opacity:.8;">${word.full}</div>
          
          <!-- 提示条 -->
          <div style="font-size:11px;color:var(--text-dim);margin-top:4px;opacity:.6;">
            首字母: <strong style="color:var(--primary)">${firstLetter}</strong> ${isVowelStart ? '(元音)' : '(辅音)'}
          </div>
        </div>

        <!-- 选项区域 -->
        <div style="margin-top:16px;">
          <div style="font-size:13px;color:var(--text-dim);margin-bottom:10px;text-align:center;">
            选择正确的变体击破词根！（${(state.fallingSpeed/1000).toFixed(1)}秒）
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;">
            ${options.map((opt, i) => {
              const v = variants[opt] || findVariantGlobal(opt);
              const color = v.color || 'var(--primary)';
              return `<button onclick="affixGameAnswer('${opt.replace(/'/g, "\\'")}')"
                      class="trans-btn"
                      style="padding:14px 22px;font-size:16px;font-weight:700;min-width:110px;border:2px solid ${color}40;background:${color}10;transition:all .2s;"
                      onmouseover="this.style.borderColor='${color}';this.style.background='${color}20';this.style.transform='scale(1.05)'"
                      onmouseout="this.style.borderColor='${color}40';this.style.background='${color}10';this.style.transform=''"
                      id="affixOpt${i}">
                <span style="color:${color}">${v.label}</span>
              </button>`;
            }).join('')}
          </div>
        </div>

        <div style="margin-top:14px;text-align:center;display:flex;gap:10px;justify-content:center;">
          <button onclick="endAffixGame()" class="trans-btn" style="background:transparent;color:var(--text-dim);font-size:12px;">退出游戏</button>
          <button onclick="togglePause()" class="trans-btn" style="background:transparent;color:var(--text-dim);font-size:12px;">⏸️ 暂停</button>
        </div>
      </div>
    </div>

    <style>
      @keyframes affixFall {
        0% { transform: translateX(-50%) translateY(-100px) rotate(-5deg); opacity: 0; filter: blur(4px); }
        10% { transform: translateX(-50%) translateY(0) rotate(0deg); opacity: 1; filter: blur(0); }
        50% { transform: translateX(-50%) translateY(40px) rotate(2deg); }
        100% { transform: translateX(-50%) translateY(120px) rotate(0deg); opacity: 1; }
      }
      @keyframes comboPulse {
        0% { opacity: 1; }
        100% { opacity: 0; }
      }
      @keyframes comboBadge {
        0% { transform: scale(0.5); }
        50% { transform: scale(1.2); }
        100% { transform: scale(1); }
      }
      @keyframes particleBurst {
        0% { transform: translate(0,0) scale(1); opacity: 1; }
        100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
      }
      @keyframes shake {
        0%,100% { transform: translateX(0); }
        20% { transform: translateX(-8px); }
        40% { transform: translateX(8px); }
        60% { transform: translateX(-4px); }
        80% { transform: translateX(4px); }
      }
      @keyframes hitFlash {
        0% { box-shadow: 0 0 0 0 rgba(0,212,170,.8); }
        100% { box-shadow: 0 0 0 20px rgba(0,212,170,0); }
      }
    </style>
  `;

  if (state.timer) clearTimeout(state.timer);
  state.timer = setTimeout(() => { affixGameTimeout(); }, state.fallingSpeed);
}

function findVariantGlobal(key) {
  for (const cat of Object.values(AFFIX_GAME_DATA)) {
    for (const child of Object.values(cat.children)) {
      if (child.variants[key]) return child.variants[key];
    }
  }
  return { label: key, color: 'var(--primary)' };
}

function spawnParticles(x, y, color, count) {
  const container = document.getElementById('particleContainer');
  if (!container) return;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    const angle = (Math.PI * 2 * i) / count;
    const dist = 30 + Math.random() * 50;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist;
    p.style.cssText = `
      position: absolute; left: ${x}px; top: ${y}px; width: 6px; height: 6px;
      background: ${color}; border-radius: 50%; pointer-events: none;
      --tx: ${tx}px; --ty: ${ty}px;
      animation: particleBurst 0.6s ease-out forwards;
    `;
    container.appendChild(p);
    setTimeout(() => p.remove(), 600);
  }
}

function showHitEffect() {
  const arena = document.getElementById('gameArena');
  if (!arena) return;
  const flash = document.createElement('div');
  flash.style.cssText = 'position:absolute;inset:0;background:rgba(0,212,170,.15);pointer-events:none;z-index:15;animation:hitFlash .4s ease-out;';
  arena.appendChild(flash);
  setTimeout(() => flash.remove(), 400);
}

function showShakeEffect() {
  const arena = document.getElementById('gameArena');
  if (arena) arena.style.animation = 'shake .4s ease-out';
  setTimeout(() => { if (arena) arena.style.animation = ''; }, 400);
}

function affixGameAnswer(selected) {
  const state = prefixGameState;
  if (!state.active || state.phase !== 'play' || !state.currentWord) return;
  if (state.timer) clearTimeout(state.timer);

  const correct = state.currentWord.correctVariant;
  const isCorrect = selected === correct;
  const fallingWord = document.getElementById('fallingWord');

  if (isCorrect) {
    // 正确：连击+粒子特效
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    const streakBonus = Math.floor(state.streak / 3) * 10;
    const points = 15 * state.level + streakBonus;
    state.score += points;
    state.subLevel++;
    state.wordsCompleted++;
    
    // 粒子特效
    if (fallingWord) {
      const rect = fallingWord.getBoundingClientRect();
      const arena = document.getElementById('gameArena');
      if (arena) {
        const arenaRect = arena.getBoundingClientRect();
        spawnParticles(rect.left - arenaRect.left + rect.width/2, rect.top - arenaRect.top + rect.height/2, '#00d4aa', 12);
      }
    }
    showHitEffect();
    
    let msg = `✅ 正确！+${points}分`;
    if (state.streak >= 3) msg += ` 🔥x${state.streak}连击!`;
    if (state.streak >= 10) msg += ' ⚡超神!';
    showToast(msg);

    if (state.subLevel > 10) {
      state.level++;
      state.subLevel = 1;
      state.fallingSpeed = Math.max(diff.fallingSpeed * 0.7, 2000);
      showToast(`🎉 恭喜！升至第 ${state.level} 大关！速度加快！`);
    }
    
    // 检查成就
    checkAchievements();
    
    setTimeout(() => {
      showAffixGamePlay(document.getElementById('appContent'));
    }, 800);
  } else {
    // 错误：震动+显示解析
    state.streak = 0;
    state.lives--;
    showShakeEffect();
    
    // 保存错误状态用于解析
    state.lastError = {
      selected: selected,
      correct: correct,
      word: state.currentWord,
      level2: state.level2
    };
    
    if (state.lives <= 0) {
      state.phase = 'over';
      setTimeout(() => showAffixGameOver(), 500);
      return;
    }
    
    state.phase = 'parse';
    setTimeout(() => showAnswerParse(document.getElementById('appContent')), 400);
  }
}

function affixGameTimeout() {
  const state = prefixGameState;
  if (!state.active || state.phase !== 'play') return;
  state.streak = 0;
  state.lives--;
  const cw = state.currentWord;
  
  state.lastError = {
    selected: null,
    correct: cw ? cw.correctVariant : '?',
    word: cw,
    level2: state.level2,
    isTimeout: true
  };
  
  showShakeEffect();
  
  if (state.lives <= 0) {
    state.phase = 'over';
    setTimeout(() => showAffixGameOver(), 500);
    return;
  }
  
  state.phase = 'parse';
  setTimeout(() => showAnswerParse(document.getElementById('appContent')), 400);
}

// === 错误解析界面 ===
function showAnswerParse(c) {
  const state = prefixGameState;
  const err = state.lastError;
  if (!err) { state.phase = 'play'; showAffixGamePlay(c); return; }
  
  const catData = AFFIX_GAME_DATA[state.level1];
  const level2Data = catData.children[state.level2];
  const correctVar = findVariantGlobal(err.correct);
  const word = err.word || {};
  
  // 生成解析文字
  let parseText = '';
  if (err.isTimeout) {
    parseText = `⏰ <strong>超时！</strong>时间到了，你没有选择答案。<br><br>`;
  } else {
    parseText = `❌ <strong>错误！</strong>你选择了 <span style="color:var(--danger)">${err.selected}</span>，但正确答案是 <span style="color:var(--primary)">${err.correct}</span>。<br><br>`;
  }
  
  parseText += `<div style="background:rgba(0,212,170,.08);padding:14px;border-radius:10px;margin:12px 0;line-height:1.8;">
    <strong style="color:var(--primary)">📖 规则解析：</strong><br>
    <strong>词根：</strong>${word.root || '?'}（${word.cn || '?'}）<br>
    <strong>完整词：</strong>${word.full || '?'}<br>
    <strong>正确变体：</strong><span style="color:${correctVar.color || 'var(--primary)'}">${err.correct}</span><br>
    <strong>规则：</strong>${correctVar.rule || '无规则说明'}<br>
    <strong>所属词缀：</strong>${level2Data.name}<br>
    <strong>当前难度：</strong>${DIFFICULTY_CONFIG[state.difficulty].label}
  </div>`;
  
  // 同类例词
  if (correctVar.words && correctVar.words.length > 0) {
    const examples = correctVar.words.slice(0, 5).map(w => `${w.root}→${w.full}（${w.cn}）`).join('、');
    parseText += `<div style="font-size:12px;color:var(--text-dim);margin-top:8px;">
      <strong>同类例词：</strong>${examples}
    </div>`;
  }

  c.innerHTML = `
    <div class="card" style="text-align:center;padding:30px 20px;">
      <div style="font-size:48px;margin-bottom:12px">💡</div>
      <div style="font-size:20px;font-weight:700;color:var(--accent);margin-bottom:16px">学习时刻</div>
      <div style="font-size:14px;color:var(--text);line-height:1.8;text-align:left;max-width:480px;margin:0 auto;">
        ${parseText}
      </div>
      <div style="display:flex;gap:12px;justify-content:center;margin-top:24px;flex-wrap:wrap;">
        <button onclick="continueAfterParse()" class="trans-btn" style="padding:12px 28px;font-size:15px;background:var(--primary);color:#fff;">继续游戏 →</button>
        <button onclick="endAffixGame()" class="trans-btn" style="background:transparent;color:var(--text-dim)">退出</button>
      </div>
      <div style="margin-top:16px;font-size:12px;color:var(--text-dim);">
        剩余生命：${'❤️'.repeat(state.lives)}${'🖤'.repeat(DIFFICULTY_CONFIG[state.difficulty].lives - state.lives)}
      </div>
    </div>
  `;
}

// === 成就检查 ===
function checkAchievements() {
  const state = prefixGameState;
  let newAchieved = false;
  Object.values(ACHIEVEMENTS).forEach(ach => {
    if (!state.achievements[ach.id] && ach.condition(state, state.achievements)) {
      state.achievements[ach.id] = ach;
      newAchieved = true;
      showToast(`🏆 解锁成就：${ach.name}！${ach.icon}`);
    }
  });
  return newAchieved;
}

// === 游戏结束 ===
function showAffixGameOver() {
  const state = prefixGameState;
  state.active = false;
  const c = document.getElementById('appContent');
  if (!c) return;

  // 星级评定
  const maxScore = state.wordsCompleted * 15 * state.level;
  const ratio = maxScore > 0 ? state.score / maxScore : 0;
  let stars = 1;
  if (ratio >= 0.9) stars = 3;
  else if (ratio >= 0.6) stars = 2;
  
  const starKey = `${state.level1}_${state.level2}_${state.difficulty}`;
  const prevStars = state.starRatings[starKey] || 0;
  if (stars > prevStars) {
    state.starRatings[starKey] = stars;
  }
  
  // 解锁检查
  if (state.wordsCompleted >= 20) {
    if (state.level1 === 'prefix' && !state.unlocked.suffix) {
      state.unlocked.suffix = true;
      showToast('🔓 解锁：后缀关卡！');
    } else if (state.level1 === 'suffix' && !state.unlocked.circumfix) {
      state.unlocked.circumfix = true;
      showToast('🔓 解锁：环绕缀关卡！');
    } else if (state.level1 === 'circumfix' && !state.unlocked.special) {
      state.unlocked.special = true;
      showToast('🔓 解锁：中缀关卡！');
    }
  }
  
  // 保存进度
  try {
    localStorage.setItem('bir_game_progress', JSON.stringify({
      achievements: state.achievements,
      unlocked: state.unlocked,
      starRatings: state.starRatings
    }));
  } catch(e) {}

  const cult = getCultivationInfo();
  const bonus = cult.level > 0 ? Math.floor(cult.level * 0.5) : 0;
  const totalScore = state.score + bonus;
  
  const starHTML = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);
  const newAchievements = checkAchievements();

  c.innerHTML = `
    <div class="card" style="text-align:center;padding:40px 20px;">
      <div style="font-size:56px;margin-bottom:16px">💥</div>
      <div style="font-size:24px;font-weight:700;color:var(--danger);margin-bottom:8px">游戏结束</div>
      
      <div style="font-size:28px;margin:12px 0">${starHTML}</div>
      <div style="font-size:12px;color:var(--text-dim);margin-bottom:12px">
        ${stars > prevStars ? '🎉 新纪录！' : ''} 本局星级：${stars}星
      </div>
      
      <div style="font-size:15px;color:var(--text);margin-bottom:12px">
        击破 ${state.wordsCompleted} 个词根 · 到达第 ${state.level} 大关 · ${DIFFICULTY_CONFIG[state.difficulty].label}难度
      </div>
      ${state.bestStreak > 2 ? `<div style="font-size:13px;color:#ff6b35;margin-bottom:8px">🔥 最高连击: ${state.bestStreak}</div>` : ''}
      <div style="font-size:36px;font-weight:700;color:var(--primary);margin-bottom:4px">${totalScore} 分</div>
      ${bonus > 0 ? `<div style="font-size:12px;color:var(--accent);margin-bottom:16px">修仙等级加成: +${bonus}分 (${cult.name})</div>` : ''}
      
      ${newAchievements ? `<div style="padding:12px;background:rgba(245,158,11,.1);border-radius:8px;margin:12px 0;font-size:13px;color:var(--accent);">🏆 本局解锁新成就！</div>` : ''}
      
      <div style="display:flex;gap:12px;justify-content:center;margin-top:24px;flex-wrap:wrap;">
        <button onclick="restartAffixGame()" class="trans-btn" style="padding:12px 24px;">🔄 再来一局</button>
        <button onclick="backToAffixLevel2()" class="trans-btn">换词缀/难度</button>
        <button onclick="endAffixGame()" class="trans-btn" style="background:transparent;color:var(--text-dim)">返回主页</button>
      </div>
    </div>
  `;
}

// 简化的口腔位置示意图（SVG）
function renderMouthDiagram(letter, pos) {
  // 根据字母返回不同的简化口腔SVG
  const isVowel = 'aiueo'.includes(letter);
  const isHigh = 'iu'.includes(letter);
  const isMid = 'eo'.includes(letter);
  const isBack = 'uoa'.includes(letter);
  const isRound = 'uo'.includes(letter);

  let tongueY = 50, mouthOpen = 30;
  if (isVowel) {
    if (isHigh) { tongueY = 25; mouthOpen = 20; }
    else if (isMid) { tongueY = 40; mouthOpen = 35; }
    else { tongueY = 60; mouthOpen = 50; }
  }

  const lipColor = isRound ? '#ff6b6b' : '#4ecdc4';
  const tongueColor = '#ff9f43';

  return `
    <svg viewBox="0 0 60 70" style="width:100%;height:100%">
      <!-- 口腔轮廓 -->
      <ellipse cx="30" cy="35" rx="22" ry="28" fill="#2a3550" stroke="#4a5568" stroke-width="1"/>
      <!-- 上颚 -->
      <path d="M 10 20 Q 30 8 50 20" fill="none" stroke="#718096" stroke-width="1.5"/>
      <!-- 舌头 -->
      <ellipse cx="${isBack ? 38 : 22}" cy="${tongueY}" rx="12" ry="8" fill="${tongueColor}" opacity="0.8"/>
      <!-- 下唇 -->
      <ellipse cx="30" cy="58" rx="${isRound ? 14 : 10}" ry="5" fill="${lipColor}" opacity="0.6"/>
      <!-- 标记点 -->
      <circle cx="${isBack ? 38 : 22}" cy="${tongueY}" r="3" fill="#fff" opacity="0.5"/>
    </svg>
  `;
}

function renderReviewMindMap(dateStr){

  const allWords = [];
  if(hist){
    hist.vocabNew.forEach(w => { if(!allWords.includes(w)) allWords.push(w); });
    hist.vocabReview.forEach(w => { if(!allWords.includes(w)) allWords.push(w); });
  }
  
  // 统计词缀词
  const affixWords = allWords.filter(w => w.toLowerCase().startsWith('ber') || w.toLowerCase().startsWith('me') || w.toLowerCase().startsWith('pe') || w.toLowerCase().startsWith('ter') || w.toLowerCase().startsWith('ke') || w.toLowerCase().startsWith('se'));
  const normalWords = allWords.filter(w => !affixWords.includes(w));
  
  // 统计词缀种类
  const affixTypes = {};
  affixWords.forEach(w => {
    const lw = w.toLowerCase();
    let prefix = '';
    if(lw.startsWith('ber')) prefix = 'ber-';
    else if(lw.startsWith('me')) prefix = 'me-';
    else if(lw.startsWith('pe')) prefix = 'pe-';
    else if(lw.startsWith('ter')) prefix = 'ter-';
    else if(lw.startsWith('ke')) prefix = 'ke-';
    else if(lw.startsWith('se')) prefix = 'se-';
    if(prefix){ affixTypes[prefix] = (affixTypes[prefix]||0)+1; }
  });
  
  let html = `<div class="date-detail"><button class="back-btn" onclick="goBack()">← 返回</button>`;
  html += `<div class="mind-map-container">`;
  
  // 中心节点
  html += `<div class="mind-center">📅 ${dateStr}<small>${topic ? topic.title + ' · Day ' + day : '学习内容'}</small></div>`;
  
  // === 一级：词汇统计 ===
  html += `<div class="mind-branch">`;
  html += `<div class="mind-l1" onclick="toggleMindLevel(this)">📊 词汇统计</div>`;
  html += `<div class="mind-l2-wrap">`;
  html += `<div class="mind-stat-grid">`;
  html += `<div class="mind-stat-item"><div class="mind-stat-num">${allWords.length}</div><div class="mind-stat-lab">总词汇</div></div>`;
  html += `<div class="mind-stat-item"><div class="mind-stat-num">${affixWords.length}</div><div class="mind-stat-lab">词缀词</div></div>`;
  html += `<div class="mind-stat-item"><div class="mind-stat-num">${normalWords.length}</div><div class="mind-stat-lab">普通词</div></div>`;
  html += `</div>`;
  
  // 词缀种类
  if(Object.keys(affixTypes).length > 0){
    html += `<div style="font-size:12px;color:var(--text-dim);margin-bottom:6px;">词缀种类分布：</div>`;
    html += `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;">`;
    Object.entries(affixTypes).forEach(([prefix, count]) => {
      html += `<span style="padding:4px 10px;background:rgba(0,212,170,.1);border-radius:12px;font-size:12px;color:var(--primary);">${prefix} ${count}个</span>`;
    });
    html += `</div>`;
  }
  html += `</div></div>`;
  
  // === 一级：单词详解 ===
  if(allWords.length > 0){
    html += `<div class="mind-branch">`;
    html += `<div class="mind-l1" onclick="toggleMindLevel(this)">📖 单词详解 (${allWords.length})</div>`;
    html += `<div class="mind-l2-wrap">`;
    
    allWords.forEach((w, idx) => {
      const v = vocabDB[w.toLowerCase()] || vocabDB[w.charAt(0).toUpperCase()+w.slice(1)] || vocabDB[w];
      const wordId = 'mindW_' + dateStr.replace(/-/g,'') + '_' + idx;
      
      html += `<div class="mind-l2">`;
      html += `<div class="mind-l2-header" onclick="toggleMindLevel(this)">${w} ${v ? '<span class="ipa">' + (v.ipa||'') + '</span>' : ''}</div>`;
      html += `<div class="mind-l2-body">`;
      
      if(v){
        html += `🇨🇳 ${v.cn||''} · 🇬🇧 ${v.en||''}<br>`;
        html += `<span style="font-size:11px;color:var(--text-dim);">${v.pos||''} · ${v.root||''}</span>`;
        
        // 三级：同义词/反义词/例句
        if((v.syn && v.syn.length) || (v.ant && v.ant.length) || (v.ex && v.ex.length)){
          html += `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);">`;
          if(v.syn && v.syn.length){
            html += `<div class="mind-l3"><span class="mind-l3-label">同义词</span>${v.syn.join(', ')}</div>`;
          }
          if(v.ant && v.ant.length){
            html += `<div class="mind-l3"><span class="mind-l3-label">反义词</span>${v.ant.join(', ')}</div>`;
          }
          if(v.ex && v.ex.length){
            v.ex.forEach(ex => {
              html += `<div class="mind-l3"><span class="mind-l3-label">例句</span>${ex.id || ex}<br><span style="color:var(--text-dim);">${ex.cn || ''}</span></div>`;
            });
          }
          html += `</div>`;
        }
      } else {
        html += `<span style="font-size:11px;color:var(--text-dim);">词库中暂无详细释义</span>`;
      }
      
      html += `</div></div>`;
    });
    
    html += `</div></div>`;
  }
  
  // === 一级：场景对话 ===
  if(topic && topic.scenes && topic.scenes.length > 0){
    html += `<div class="mind-branch">`;
    html += `<div class="mind-l1" onclick="toggleMindLevel(this)">🗣️ 场景对话 (${topic.scenes.length})</div>`;
    html += `<div class="mind-l2-wrap">`;
    
    topic.scenes.forEach((scene, sIdx) => {
      html += `<div class="mind-l2">`;
      html += `<div class="mind-l2-header" onclick="toggleMindLevel(this)">${scene.icon||'💬'} ${scene.title||'场景'}</div>`;
      html += `<div class="mind-l2-body">`;
      
      if(scene.dialogue && scene.dialogue.length > 0){
        scene.dialogue.forEach(d => {
          html += `<div class="mind-dialogue-row">`;
          html += `<div class="mind-dialogue-sp">${d.speaker}</div>`;
          html += `<div class="mind-dialogue-text">${d.text}</div>`;
          if(d.trans) html += `<div class="mind-dialogue-trans">${d.trans}</div>`;
          html += `</div>`;
        });
      }
      
      html += `</div></div>`;
    });
    
    html += `</div></div>`;
  }
  
  // === 一级：演讲短文 ===
  if(topic && topic.speech && topic.speech.length > 0){
    const speech = topic.speech[day - 1] || topic.speech[0];
    if(speech){
      html += `<div class="mind-branch">`;
      html += `<div class="mind-l1" onclick="toggleMindLevel(this)">🎤 演讲短文</div>`;
      html += `<div class="mind-l2-wrap">`;
      
      html += `<div class="mind-speech-box">`;
      html += `<div class="mind-speech-title">${speech.title || '演讲'}</div>`;
      if(speech.ind){
        html += `<div class="mind-speech-text">${speech.ind}</div>`;
      }
      if(speech.cn){
        html += `<div class="mind-speech-trans">${speech.cn}</div>`;
      }
      html += `</div>`;
      
      html += `</div></div>`;
    }
  }
  
  // === 一级：语法要点 ===
  if(topic && topic.grammar){
    html += `<div class="mind-branch">`;
    html += `<div class="mind-l1" onclick="toggleMindLevel(this)">📐 语法要点 · ${topic.grammar.title || ''}</div>`;
    html += `<div class="mind-l2-wrap">`;
    
    if(topic.grammar.rules && topic.grammar.rules.length > 0){
      topic.grammar.rules.forEach((rule, rIdx) => {
        html += `<div class="mind-l3" style="margin-bottom:6px;"><span class="mind-l3-label">Rule ${rIdx+1}</span>${rule}</div>`;
      });
    }
    
    if(topic.grammar.examples && topic.grammar.examples.length > 0){
      html += `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);">`;
      html += `<div style="font-size:11px;color:var(--primary);font-weight:600;margin-bottom:4px;">示例</div>`;
      topic.grammar.examples.forEach(ex => {
        html += `<div class="mind-l3">${ex}</div>`;
      });
      html += `</div>`;
    }
    
    html += `</div></div>`;
  }
  
  // === 学习记录摘要 ===
  if(hist){
    html += `<div class="mind-branch">`;
    html += `<div class="mind-l1" onclick="toggleMindLevel(this)">📋 当日学习记录</div>`;
    html += `<div class="mind-l2-wrap">`;
    html += `<div class="mind-stat-grid">`;
    html += `<div class="mind-stat-item"><div class="mind-stat-num">${hist.vocabNew.length}</div><div class="mind-stat-lab">新学</div></div>`;
    html += `<div class="mind-stat-item"><div class="mind-stat-num">${hist.vocabReview.length}</div><div class="mind-stat-lab">复习</div></div>`;
    html += `<div class="mind-stat-item"><div class="mind-stat-num">${hist.translations}</div><div class="mind-stat-lab">翻译</div></div>`;
    html += `</div>`;
    if(hist.notes) html += `<div style="font-size:12px;color:var(--text-dim);margin-top:8px;padding:8px;background:var(--bg-card);border-radius:6px;">📝 ${hist.notes}</div>`;
    html += `</div></div>`;
  }
  
  html += `</div></div>`;
  c.innerHTML = html;
  updateTopbarButtons();
}
</script>
</body>
</html>
